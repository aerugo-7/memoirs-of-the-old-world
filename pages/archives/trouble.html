ext":"是的，先生，我想对你们所有人——桑顿家族和杰里·迪恩的家人说，我非常抱歉。我希望上帝能赐予你们平静。","tags":["38岁","哈里斯"]},{"name":"Mauriceo Brown","text":"是的，我有话要说。致受害者家属，我很抱歉你们失去了一位兄弟、亲人和朋友。致我的家人，我爱你们所有人。抬起头来，要知道我即将去一个更好的地方。你们要照顾好阿莱达，确保她是这个家庭的一部分。我感激你们所有人，爱你们。我为你们以这种方式失去亲人而道歉。愿上帝保佑你们所有人。好了，典狱长。","tags":["31岁","贝萨尔"]},{"name":"Derrick O'Brien","text":"我有话要说。我很抱歉。我一直都很抱歉。这是我一生中犯下的最严重的错误。不是因为我现在身陷此地，而是因为我所做的事伤害了很多人——你，还有我的家人。我很抱歉；我一直都很抱歉。我很抱歉。你们要相互照顾。我爱你们所有人。要相互支持。好了。但我很抱歉；非常抱歉。我也爱你。好了。","tags":["31岁","哈里斯"]},{"name":"Angel Resendiz","text":"是的，长官。我想请求，如果你心里愿意的话，请你原谅我。你不必原谅我。我知道我让魔鬼主宰了我的生命。我只请求你原谅我，并请求主原谅我让魔鬼欺骗了我。我感谢上帝对我的耐心。我不配让你承受痛苦。你不该遭受这一切。我罪有应得。","tags":["45岁","哈里斯"]},{"name":"Lamont Reese","text":"是的。妈妈，我只想让你知道我爱你。我希望你们所有人都知道我爱你们。我很平静；我们知道这是怎么回事。我们知道真相。远离犯罪，这毫无意义。我很平静。我们知道真相，我知道真相。我感到一些平静。我很高兴没有拖那么久——没有10年或20年。我很平静。我希望每个人都知道，我没有选择这条路，因为这是赤裸裸的谋杀。我只想让每个人都知道我没有选择这条路。原因就是这是谋杀。我不会在自己的谋杀中扮演角色。没有人应该这样做。我爱你们所有人。我不知道你们所有人的名字。我不知道你们对我是什么感觉。无论你们信不信，我没有杀他们。我只希望你们都能拥有平静；你们明白我的意思。这毫无意义。这既不在这里也不在那里。你们必须放下它。是时候继续前行了。你们明白我的意思。我希望我的每一个亲人都能继续前行。我很高兴没有持续太久。我很高兴没有持续太久。我很平静。我完全平静。做这件事的人——他们自己心里清楚。我不是来指责谁的。上帝会让他们知道的。如果需要付出这样的代价，那就做你必须做的事来度过它。需要做的一切。我准备好了，典狱长。爱你们所有人。让我儿子知道我爱他。","tags":["28岁","塔兰特"]},{"name":"Timothy Titsworth","text":"是的，法官大人。我知道你们这些人来这里是为了为你们所做的事或我所做的事找到解脱。对于你们这些年来所经历的痛苦和折磨，我无法用言语形容，这是我从你们那里无法挽回的。我希望梅根，如果她今天在场，知道今天我希望你获得平静和喜悦。我很抱歉花了14年才得到解脱。如果这能带来解脱或让她回来，我多年前就会这样做了，我保证，我保证。我的家人都知道我对你们说这些话时心中的真诚。我不是有意给你们家带来痛苦和折磨。我祈祷她在天堂安然无恙。我祈祷你们找到解脱和力量。我的家人为你们和每个人祈祷，如果这些话能触动你们的心，对不起，我真的对不起。你们保重。我爱你们。牧师告诉梅根我抱歉。","tags":["34岁","兰德尔"]},{"name":"Jermaine Herron","text":"是的，先生。对杰里·纳特先生，我只希望这能为您的家人带来一些平静。我希望我能把他们带回来，但我做不到。我希望我的死能带来平静；不要执着于仇恨。妈妈，坚强点。主啊，宽恕我的罪过，因为我来了。走吧，典狱长。","tags":["27岁","雷富希奥"]},{"name":"Jackie Wilson","text":"我可以对我的家人说话吗？亲爱的，我爱你。坚强点，照顾好自己。谢谢你们的陪伴。照顾好自己。艾琳女士，谢谢你做的一切。哈特牧师，谢谢你帮助我。加里，谢谢你。玛丽亚，玛丽亚，我爱你，宝贝。谢谢你陪伴我，这里的所有人都会找到犯下这该死罪行的人。我要回家与上帝同在。谢谢。谢谢你，典狱长。","tags":["39岁","达拉斯"]},{"name":"Kevin Kincy","text":"是的。我要感谢我所有的朋友和支持者，安妮·韦斯特，我爱并尊重她。来自德国的加布里埃尔·乌尔，以及无数其他的朋友。当然还有我的家人，我的父母，兄弟姐妹，侄女侄子，我的妻子芭芭拉和我的孩子们——娜迪亚、阿米尼亚、基拉和诺埃米。我爱我的孩子们。我爱我的家人。就说这些。","tags":["38岁","哈里斯"]},{"name":"Robert Salazar, Jr.","text":"是的。是的，我说。我直接对着前面说就可以吗？好的。对墙两边的所有人——我想让你们知道我爱你们。我为那个孩子失去生命感到抱歉，但我不应该在这里。告诉我的家人我爱他们，我们会在天堂相见。有空就回家看看。我说完了。爱你们所有人。","tags":["27岁","拉伯克"]},{"name":"Tommie Hughes","text":"我爱我的家人。你们都要坚强。互相照应。保持坚强。我爱你。我爱你。我的时刻到了。我的时刻到了。我爱你。保持坚强。","tags":["31岁","达拉斯"]},{"name":"Clyde Smith, Jr.","text":"是的。我想感谢你们所有人的到来，以及你们的爱与支持。也感谢你们的努力，彼得和洛雷尔。我爱你们所有人。塞琳娜，我爱你。我说完了。","tags":["32岁","哈里斯"]},{"name":"Robert Neville, Jr.","text":"是的。卡罗琳·巴克女士，还有蒂娜，我想向你们所有人道歉。向艾米的妹妹，还有这里的其他人。我爱你们所有人。我希望你们能原谅我，我希望这一切能稍微减轻你们的痛苦，我希望主能给你们安慰和平静。我只想让你们知道，我对我的所作所为感到非常抱歉。如果我在另一边见到艾米，我会告诉她你们有多爱她、多想念她，我们会有很多话要说。妈妈，爸爸，还有夏洛特——我为让你们经历所有这些痛苦和事情感到抱歉。我确实和布兰登谈过，我想我阻止了一些事情。我爱你们所有人，我们会在另一边相见。好的。","tags":["31岁","塔兰特"]},{"name":"Jaime Elizalde, Jr.","text":"是的，长官。亲爱的克斯廷，过去这几年有你在我的生命中是我的福气。对我所有的朋友们，感谢你们的友谊、支持以及为我做的一切。在后面等待的兄弟们，保持信念，保持坚强，将你们的信仰寄托于主。人生中很多时候我们会走错路，每件事都有后果。错误会被犯下，但有了上帝，一切皆有可能。所以，将你的信仰和信任交托给祂。我们谈论最高法院的缓刑或暂缓执行，但你们必须面对的是天上真正的最高法院，而不是这里的。抬起头来，保持坚强。我爱你们所有人。就这些。保持坚强。谢谢。","tags":["34岁","哈里斯"]},{"name":"Marion Dudley","text":"无","tags":["33岁","哈里斯"]},{"name":"Shannon Thomas","text":"是的。老兄，我只想让你知道我有多么爱他们。我希望你坚强地度过这段时间。不要退缩。继续前进。不要让这件事阻碍你。让每个人都知道我爱他们（列举了几个名字），凯文——以及家里的其他所有人。告诉他们我爱他们，保持坚强。这有点难以组织语言；我有点紧张，思绪也难集中。有时候你不知道该说什么；我希望这些话能给你安慰。我不知道该说什么。我想让你知道我爱你；只要保持坚强，不要放弃。让每个人都知道我爱他们……而且爱是无条件的，就像妈妈一直告诉我们的那样。我的肉体可能不在了，但我的精神永远与你们同在。我爱你。","tags":["34岁","哈里斯"]},{"name":"Robert Rowell","text":"是的，长官。我想向受害者的家人道歉，以及我给他们带来的所有悲痛。我想说我爱旁边的女孩们。赞美主。我们走吧，典狱长。就这些。","tags":["50岁","哈里斯"]},{"name":"Charles Thacker","text":"杰克和艾琳，我爱你们。告诉我的家人我爱他们。我为所做的事感到抱歉。我知道上帝会原谅我的。替我照顾好丹妮尔。我会想你们的。我爱你们。我想就这些了。","tags":["37岁","哈里斯"]},{"name":"William Chappell","text":"简、格蕾丝以及各位，我知道你们认为是我干的，也知道在你们眼中这或许是天经地义的。但让我告诉你们，进行了两次DNA检测，没有一次与我匹配。我要求做第三次，但未能实现。三个不同的人在不同时间承认杀害了这些人——你的父母。他们根本不认识我。我的请求是，你们去教堂祈祷宽恕，因为你们正在置我于死地。我一生从未杀过任何人。如果你们看看自己的房子和警方报告，会发现有多处弹痕射入床上方的西墙、东墙和北墙，而你妹妹当时就在前面的卧室里，面对三十发枪击。她绝不可能躺在那张床上。如果你们认为是我做的，请三思。房子里有三个人已经认罪。沃斯堡的拉里·阿什沃斯杀了七个人。我唯一要求的就是进行DNA检测，却无法得到。但请去教堂，与上帝和解。简，你心知肚明我没有猥亵过你的孩子。你们正在置我于死地，我为你们感到遗憾。去教堂吧，获得救赎。我真的不知道还能说什么了。","tags":["66岁","塔兰特"]},{"name":"Melvin White","text":"请告诉贝丝和他们，我为给你们家庭带来的痛苦感到抱歉，真心实意地道歉。她曾是我的朋友，我却辜负了她的信任。我爱你们所有人。告诉妈妈我爱她。耶和华是我的牧者，我必不致缺乏。他使我躺卧在青草地上，领我在可安歇的水边。他使我的灵魂苏醒，为自己的名引导我走义路。我虽然行过死荫的幽谷，也不怕遭害，因为你与我同在。在我敌人面前，你为我摆设筵席；你用油膏了我的头，使我的福杯满溢。我一生一世必有恩惠慈爱随着我，我且要住在耶和华的殿中，直到永远。我们在天上的父，愿人都尊你的名为圣。愿你的国降临。愿你的旨意行在地上，如同行在天上。我们日用的饮食，今日赐给我们。免我们的债，如同我们免了人的债。不叫我们遇见试探，救我们脱离凶恶。因为国度、权柄、荣耀，全是你的，直到永远。阿们。好了，典狱长，我们给他们想要的吧。","tags":["55岁","佩科斯"]},{"name":"Luis Ramirez","text":"是的。我想先对你们说。我没有杀害你们的亲人，但我希望有一天你们能找到真凶。我多希望能告诉你们原因，或者给你们一些安慰；你们失去了深爱的人。就像我的家人和朋友再过几分钟就要失去我一样。我相信他死得不公，就像我一样。我没有谋杀他；我与他的死毫无关系。对我的家人和朋友们，我深爱着你们。即使我死了，对你们的爱也永远不会消逝。主啊，我将我的灵魂交在你手里。谢谢。谢谢大家。","tags":["42岁","汤姆格林"]},{"name":"Ronald Howard","text":"是的，长官。对受害者家属说。我希望这能有一点帮助。我不知道怎么帮助，但我希望有用。我爱你们所有人，所有。你知道我爱你们。感谢你们让我的孩子回到我的生活。谢谢。我爱你们所有人。我非常爱你们。非常感谢。（声明于06年1月9日修正）","tags":["32岁","特拉维斯县"]},{"name":"Francis Newton","text":"无","tags":["40岁","哈里斯"]},{"name":"Robert Shields","text":"无","tags":["30岁","加尔维斯顿"]},{"name":"Gary Sterling","text":"我希望牧师能做个祷告，不仅为我，也为受害者家属。他们被误导了，我很抱歉。我要说的就这些。","tags":["38岁","纳瓦罗"]},{"name":"David Martinez","text":"只有天空和绿草是永恒的，今天是个赴死的好日子。","tags":["29岁","特拉维斯县"]},{"name":"Alexander Martinez","text":"是的。受害者家属不在场，所以我不对他们说话。我想感谢我的家人和朋友的一切。我的妻子艾尔莎，我的嫂子劳拉——谢谢你们在这里陪我。我爱你们。也感谢波兰斯基监狱的朋友们，他们不认同我的决定，却依然给予我友谊，帮助我度过难关。我感谢他们。典狱长……","tags":["28岁","哈里斯"]},{"name":"Bryan Wolfe","text":"是的，长官。对伊迪、汤姆和卡玛——我爱你们所有人。感谢你们的支持。我爱你们，玛格丽塔、圭多神父和安吉洛神父。感谢你们的精神支持，以及所有为我祈祷的人。我会没事的。我对这一切都感到平静，我不必再在监狱里醒来了。我爱你们所有人。我完全顺服主。我准备好了，典狱长。","tags":["44岁","杰斐逊"]},{"name":"Lonnie Pursley","text":"是的。我想对受害者的家人说。我收到了你们的诗，我非常感激你们的宽恕。但我仍然请求你们的宽恕。耶稣在我心中，我为给你们带来的任何痛苦感到抱歉。谢谢你们的宽恕。对不起。阿什莉、帕姆——我会想念你们所有人。我爱你们所有人。替我向每个人问好。替我向每个人问好，好吗？妈妈、詹姆斯、贾斯汀、科里、布伦特、孙辈们和爸爸——我爱你帕姆。我爱你阿什莉、帕米和艾琳。我们会在另一边相见。死囚区有几个帮助我的朋友；Shy Town和Crazy Jay……我爱你们，感谢你们的支持。还有雷叔叔。我得救了，我要回家了，好吗？你们都要坚强。你们都要坚强。就这些。","tags":["43岁","波尔克"]},{"name":"Douglas Roberts","text":"是的，长官，典狱长。好吧，我在这冰棍摊前站得太久了。在我离开之前，我想告诉你们所有人。当我死的时候，把我埋深点，在我脚边放两个扬声器，头上戴个耳机，在我死后用摇滚乐送我走。总有一天我们会在天堂相见。就这些了，典狱长。","tags":["42岁","肯德尔"]},{"name":"George Hopper","text":"我想向你道歉，我很抱歉。我一生中犯了很多错误。我所做的事改变了许多人的生命。我无法挽回，那是一场暴行。我很抱歉。我乞求你的原谅，我知道我不配。我爱你们，妈妈和爸爸，以及我所有的家人。感谢你们的一切。耶稣，感谢你的爱和拯救的恩典。感谢你在各各他为我流下宝血。感谢你耶稣向我展现的爱。","tags":["49岁","达拉斯"]},{"name":"Dennis Bagwell","text":"是的，长官，你能听到吗？对你说，艾琳，谢谢你。我爱你们所有人。好了，典狱长，我准备好了。","tags":["41岁","阿塔斯科萨"]},{"name":"Robert Coulson","text":"我是无辜的。我家人的谋杀案与我无关。我要感谢所有支持我的人。希望你们继续斗争。你们知道自己在做什么。就这些。谢谢你，典狱长。","tags":["34岁","哈里斯"]},{"name":"Troy Kunkle","text":"是的，长官。我请求你原谅我。我犯了一个错误，我为我所做的感到抱歉。我所能做的就是请求你原谅我。我爱你们，我们将在天堂相见。我非常爱你们。赞美耶稣。我爱你们。我们在天上的父，愿人都尊你的名为圣。愿你的国降临，愿你的旨意行在地上，如同行在天上。我们日用的饮食，今日赐给我们。免我们的债，如同我们免了人的债。不叫我们遇见试探，救我们脱离凶恶。阿们。","tags":["38岁","纽埃西斯"]},{"name":"James Porter","text":"是的，长官。我想向受害者的家人道歉。我为给你带来的痛苦感到抱歉。我知道这是巨大的损失，我想道歉。对不起。对我的家人，我爱你们，我们会在天堂再见。好了。","tags":["33岁","鲍伊县"]},{"name":"Anthony Fuentes","text":"是的，长官。抱歉让我家人经历这些。你们都知道我得到了平安。我希望你们也找到平安。对家属说，真相会水落石出，我希望你们找到平安。我得到了我的平安。我希望每个人都能得到平安。我累了。我会留在你们心中。我爱你们所有人。对其他人说，真相终将大白。它没能及时出现来救我的命。让家属经历这些是错误的。但当真相出来时，我希望它能阻止这一切。检察官撒谎，让证人说出他们需要他们说的话，这是错误的。真相一直都在。我只希望每个人都能得到平安。今天我得到了我的。我爱你们所有人。","tags":["30岁","哈里斯"]},{"name":"Frederick McWilliams","text":"是的。好吧，我们又来了，朋友们，在司法的地穴里。你知道有很多我想说的话——很多我以为我会说的话——但实在没有太多可说的。有些人会生气，以为我试图从中寻求自由，但只要我还看到——自由属于我，我会继续前行。锁链也许能束缚我的身体，但不能束缚我的思想，否则只会杀死我。我爱你们，妈妈、米斯蒂、安妮特、布伦达和安东尼——以及所有支持我的朋友和每个人。我把我的爱留在这里；我永远不会停止爱你们。我的爱会留在这里。","tags":["30岁","哈里斯"]},{"name":"Demarco McCullum","text":"是的。我只想向这些年来支持我的人说，我感激你们，我爱你们。我只想告诉我妈妈我爱她，我们会在天堂相见。","tags":["30岁","哈里斯"]},{"name":"Daniel Reneau","text":"无","tags":["27岁","吉莱斯皮"]},{"name":"Robert Morrow","text":"是的。迈克和艾莉森女士，我想告诉你们，我为我的所作所为以及给你们带来的痛苦负责并深感抱歉。我爱你厄琳，以及所有支持我的朋友。我感到很幸福能有你们。保持坚强，照顾好那些孩子。放我自由吧，典狱长。天父，请接纳我。","tags":["47岁","利伯蒂"]},{"name":"Lorenzo Morris","text":"无","tags":["52岁","哈里斯"]},{"name":"Dominique Green","text":"是的。天哪，那里人真多。有很多人帮助我走到了这一步，我无法一一感谢他们。但谢谢你们的爱与支持；你们让我做到了许多单凭自己无法完成的事。希拉，我真希望七年前就遇见你；那样一切会容易得多。但我克服了许多困难。我并不生气，只是对未能获得公正感到失望。然而，我很高兴能拥有你们作为家人和朋友。你们一直陪伴着我，这真是个奇迹。我爱你们。还有，我必须跟杰西卡说声对不起。我从未想到会落到这地步。洛娜，你知道你必须继续我的抗争。我知道你刚失去了孩子，但你必须坚持下去。安迪，我爱你，兄弟。告诉安德烈他们，我没能发挥出全部潜力，但你可以帮助他们实现他们的。你们需要我，但我却不知如何陪伴他们。我有太多话要说，但无法一一道尽。我爱你们所有人。请继续奋斗。如果你们背弃我，就等于背弃了他们。我爱你们所有人，也会想念你们所有人。感谢你们让我触及了那么多心灵。我从不知道我能做到，但你们让它成为可能。我只是很抱歉。我也没有自己想象中那么坚强。但我想痛苦只是暂时的。你们都是我的家人。请记住我。","tags":["30岁","哈里斯"]},{"name":"Ricky Morrow","text":"是的，我确有遗言。首先，我想说我爱你，帕姆。我爱你，安、珍妮、卡拉、弗兰、妈妈和爸爸。你们是我生命中的恩赐，何其有幸。我为你们现在所经历的一切感到非常抱歉。但我们都在走向一个更好的地方。谢谢你，宝贝女儿——我爱你们大家。姐姐、布莱基、迪克西、拉斯蒂、安迪、巴斯特、米洛——我们还有很多——还有格雷斯和桑尼。我爱你们所有人。你们将得到一份礼物。感谢你们一直支持我——还有我们的父亲和母亲。给他们一个拥抱，并转达我的爱。我准备好了，典狱长。","tags":["53岁","达拉斯"]},{"name":"Donald Aldrich","text":"是的，长官，我愿意。致韦斯特家族，我想为你们的损失道歉。希望你们能原谅我。致我的家人、爱人和朋友们，我感谢你们所有人的支持，并为给你们造成的痛苦和伤害感到抱歉。我爱你们所有人，我们将在另一边相见。好了，典狱长。","tags":["39岁","克尔"]},{"name":"Peter Miniel","text":"主啊，我将我的灵魂交在你手中。阿门。","tags":["42岁","哈里斯"]},{"name":"Edward Green","text":"是的，我确有遗言。致我的家人、朋友，以及那些接受真实的我的人们。致沙利文和海登家族，我来到这里，并非意图装作一个不是自己的人。我从未自称是最好的。我不是世界上最好的父亲、最好的儿子，或最好的朋友。我只是用我所拥有的尽力而为了。我心中没有仇恨或怨恨。对我的家人和你们所有人，我只能为给你们带来的所有痛苦道歉。愿上帝在今天宽恕我们。我准备好了，随时可以。","tags":["30岁","哈里斯"]},{"name":"Andrew Flores","text":"是的，长官。今天我要回到主那里了。但首先，我有话要说。我真的很抱歉。我夺走了一位家人的生命，我不该这样做。希望你们能继续前行。我只是很抱歉。我不知道还能说什么。我无法让任何人起死回生。如果我能，我会的。希望你们会好起来。我不会请求你们的原谅。上帝会审判我。致我的家人和朋友，我爱你们所有人。你们多保重，还有，找到沃伊德。要坚强，我们会再见的；希望不是很快。抬起头来。这就是我想说的全部。","tags":["32岁","贝萨尔"]},{"name":"James Allridge, III","text":"是的。我想感谢我的家人和朋友；感谢我的家人对我的爱和给予我这么多关爱。我很抱歉，真的。布莱恩的姐姐，谢谢你的爱——它意义重大。肖恩——希望他能找到平静。很抱歉我毁掉了你们所有人的生活。谢谢你们原谅我。爱你们直到月亮再回来——我爱你们所有人。","tags":["41岁","塔兰特"]},{"name":"Jasen Busby","text":"是的，我确有遗言。我想告诉所有人，我的家人，谢谢你们支持我。我想告诉格雷先生和女士以及所有人，我做的事并非有意伤害你们。我为自己所做的事感到抱歉。我认为你们不知道我这么做的真正原因，但布兰迪和我有过一个自杀约定，而我却没有坚持到底。这一点在审判中没有被提及。我告诉你们这些不是为了伤害你们，而是想告诉你们真相。我想让辛迪知道，我知道她在外面——还有文森特·埃尔南德斯，我爱他们。感谢你们所做的一切，我想确认你们一切都好。这就是我想说的。我准备好了。回头见。我准备好了。","tags":["28岁","切罗基县"]},{"name":"David Harris","text":"是的，我确有遗言。长官，为了纪念一位真正的美国英雄。“我们行动吧。”主耶稣，接收我的灵魂。","tags":["43岁","杰斐逊"]},{"name":"Kelsey Patterson","text":"声明什么。声明什么。我对谋杀指控无罪。偷走我和我家人的钱。我的真相永远是我的真相。没有亲人也没有朋友；我不怕你对我做什么。与你这个殡仪员没关系。凶手。[部分陈述因粗俗语言被省略]拿回我的钱。归还我的权利。归还我的权利。归还我的权利。把命还我。","tags":["50岁","安德森"]},{"name":"Marcus Cotton","text":"是的，典狱长，我有。嗯，妈妈，有时事情就是这样。热爱生活；活得长久。当你面对现实时，真实的并不总是你想要的。保重。我爱你。告诉我的孩子们我爱他们。上帝是真实的。他即将发现一些深刻的、真实的事情。振作起来，宝贝。你明白我的意思。你们大家都保重。就这样。","tags":["29岁","哈里斯"]},{"name":"Cameron Willingham","text":"是的。我唯一想说的是，我是无辜的——被定了一个我没犯的罪。我因没做过的事被诬陷了12年。我从上帝的尘土中来，也将归于尘土——所以大地将成为我的宝座。我得走了，兄弟。我爱你，加比。[剩余陈述因粗俗语言被省略。]","tags":["36岁","纳瓦罗"]},{"name":"Bobby Hopkins","text":"无","tags":["36岁","约翰逊"]},{"name":"Edward Lagrone","text":"是的。我只想说，我今天不悲伤，也不怨恨任何人。就像我从一开始就说的，我没有进去杀死他们——但我并不比那些做了的人更好。耶稣是主。","tags":["46岁","塔兰特"]},{"name":"Billy Vickers","text":"是的。我只想对家人说，为我造成的所有痛苦道歉。我爱你们所有人。告诉妈妈和孩子们我爱你们；我爱你们所有人。如果可以，我想澄清一些事。汤米·珀金斯，那个因谋杀金斯洛而被判终身监禁的人——他没有杀人。是我干的。如果他早知道我会开枪杀人，他根本不会与这件事有任何牵连。如果他知道，也不会跟我去。我是受雇去杀那个人的。而马丁，那个年轻的男孩，不知道这是怎么回事。他以为只是抢劫。对此我很抱歉。这并非私人恩怨。我只是为了谋生。一位在伊斯特汉姆因杀害杰米·肯特而被判无期徒刑的男孩——不是我干的，但事情发生时我和他父亲在一起。我就在那里和他一起，这些年里还有另外几起是我做的或参与其中的。我很抱歉，我不确定到底有多少——我想总共一定有十二或十四起。其中一起我想澄清的是卡伦·戴维斯案——他被指控枪杀妻子。所有这些都不是私人恩怨。只是我为了谋生做的事。为我造成的所有痛苦道歉。我爱你们所有人。我要说的就这些。","tags":["58岁","拉马尔县"]},{"name":"Kevin Zimmerman","text":"是的。康妮、南妮、比亚、凯西和理查德——我爱你们所有人，非常感谢你们用爱支持我。奉耶稣的名，我为给你们带来的痛苦感到抱歉。我很抱歉。吉尔伯特不该死，我想让你们知道我很抱歉。我祈祷主赐予你们平安。好了。","tags":["42岁","杰斐逊"]},{"name":"Kenneth Bruce","text":"是的，先生。我想感谢上帝赐予我的一切祝福。我祈求，通过他的怜悯，他能让我进入他的恩典之中。向艾尔斯女士的家人，我想为我造成的所有痛苦和苦难道歉，愿上帝让你们得到解脱。我祈求他保佑你们。对我的家人，要知道我爱你们每一个人，祈求上帝赐予你们平安和力量。我可能无法与你们在肉体上同在，但蒙恩典，我的心与你们同在，我知道上帝爱你们每一个人。","tags":["32岁","科林"]},{"name":"Ivan Murphy","text":"是的，先生，我有。我想感谢今晚在场的所有人，来庆祝生命。这是对生命的庆祝，而非死亡。通过耶稣基督，我们战胜了死亡。我想感谢圣父和教皇约翰·保罗的天使般的祝福，以及所有的祈祷和支持。还要感谢（名字不详的）神父和吉多·托德斯基尼的爱与支持。我想感谢世界各地的每一个人，天父，愿你的旨意成就。我会把这份陈述说得简短些。我爱你们所有人。我准备好了，典狱长。","tags":["38岁","格雷森"]},{"name":"Richard Duncan","text":"我本来有话说，但现在看到我的家人在这里和一切——我只想说，我深爱你们所有人。我是无辜的。我深爱你们所有人。你们都很美。好了，典狱长，我说完了。","tags":["61岁","哈里斯"]},{"name":"Robert Henry","text":"无","tags":["41岁","圣帕特里西奥县"]},{"name":"Larry Hayes","text":"我想让罗莎琳的家人和亲人，以及我的妻子玛丽的家人知道，我对我所做的一切真诚地感到抱歉。我希望你们能发自内心地原谅我。我的行为没有任何借口。罗莎琳的母亲在审判时问我：“为什么？”我对此没有一个好的理由。请原谅我。至于我在场的朋友和家人——感谢你们一直支持我，要知道我爱你们，我会带着你们的一部分离开。我想感谢一位逮捕我的警官，当时我如果能杀了他就会杀了他。他对我进行了心肺复苏，救了我的命，给了我把人生扳正的机会。我知道今晚我会见到玛丽和罗莎琳。我爱你们所有人。","tags":["54岁","蒙哥马利"]},{"name":"Allen Janecka","text":"首先，我想说愿上帝祝福今天在场的每一个人。很多年来，我一直我行我素，这给我自己、我的家人和许多其他人带来了很多痛苦。今天我意识到，为了和平与幸福，一个人必须按照上帝的方式行事。我想感谢我的家人对我的支持。我爱你们。我带你们一起走。你们要坚强。我爱你们。我还想感谢这些年我遇到过的牧师们，他们带我走了很长的路。我把你们视为家人珍惜，此时……哦，肯，我的小儿子，我要来看你了。哦，主啊，我将我的灵魂交在你手里。愿你的旨意成就。","tags":["53岁","哈里斯"]},{"name":"Cedric Ransom","text":"我只想对卡特里娜和丽贝卡说。你们对我一直很美好。如果没有你们在我生命中，我不会挺过来。也许我会奋力抗争；是你们让我平静下来。我爱你们。我尊重你们。大哥，你尽了最大的努力抗争，我爱你。就这些。","tags":["29岁","塔兰特"]},{"name":"Christopher Black, Sr.","text":"无","tags":["43岁","贝尔"]},{"name":"Stanley Baker, Jr.","text":"嗯，我没什么好说的。我对我对彼得斯先生所做的事感到抱歉。仅此而已。","tags":["35岁","布拉索斯"]},{"name":"Hilton Crawford","text":"首先，我想请特蕾莎修女给康妮送一朵黄玫瑰。我要感谢主耶稣基督，让我在死囚牢房里度过了这些年。这在我生命中是蒙福的。我有机会服侍耶稣基督，我为此心怀感恩。我要感谢沃尔什神父让我成为方济各会士，也感谢全世界所有成为我朋友的人。这在我生命中是一段奇妙的经历。我要感谢洛佩兹牧师，以及我的见证人给予我的支持和爱。我要感谢英格兰的修女们给予我的支持。我想告诉我的儿子们我爱他们；我一直都爱他们——他们是上帝赐予我最伟大的礼物。我想告诉我的见证人坦尼、丽贝卡、阿尔、利奥和布莱克威尔博士，我爱你们所有人，感谢你们的支持。我想请求宝莱特发自内心地原谅我。我希望有一天你会原谅。这对你的家庭和我的家庭都是个悲剧。对不起。我的特别天使，我爱你。我也爱你，康妮。愿上帝温柔地把我带到天国的彼岸。我准备好了。","tags":["64岁","蒙哥马利"]},{"name":"Kia Johnson","text":"告诉妈妈我爱她，告诉孩子们我也爱他们。我们回头见。","tags":["38岁","贝萨尔"]},{"name":"Bruce Jacobs","text":"你能听到我吗，克里斯？耶和华是我的牧者，我必不至缺乏。他使我躺卧在青草地上，领我在可安歇的水边。他使我的灵魂苏醒，为自己的名引导我走义路。我虽然行过死荫的幽谷，也不怕遭害，因为你与我同在；你的杖，你的竿，都安慰我。在我敌人面前，你为我摆设筵席；你用油膏了我的头，使我的福杯满溢。我一生一世必有恩惠慈爱随着我；我且要住在耶和华的殿中，直到永远。我想感谢这些年你一直在我身边，支持我，让我持守真道。迈克尔，你照顾好她，感谢你唐神父和克里斯。我还想感谢媒体一直以来对我的友善。再见，克里斯。我会见到你的。照顾好自己，你们要坚强。继续做你们的事工。","tags":["56岁","达拉斯"]},{"name":"Roger Vaughn","text":"无","tags":["48岁","威尔巴格"]},{"name":"John Chavez","text":"对于媒体，我想请你们告诉所有受害者及其亲人，我对夺走他们亲人的生命感到非常、非常抱歉。我希望他们能发自内心地原谅我对他们所做的一切。我现在是另一个人了，但这并不能改变我所犯下恶行的事实。上帝能赐予你们祂赐予我的那种平安，你们可以安息在祂手中。对我美丽的家人，要坚强。记住我说的话：“上帝就是道路、真理和生命。”好了，典狱长。","tags":["34岁","达拉斯"]},{"name":"Monty Delk","text":"我只有一句话要说：把你们的典狱长从这弄走，然后闭嘴。我来自巴巴多斯岛。我是这个监狱单元的典狱长。大家正看着你这么做。","tags":["35岁","安德森"]},{"name":"James Colburn","text":"我想说的是，这一切本不该发生，现在我要死了，也没什么可担心的了。我知道这是个错误。除了我自己，我谁也不怪。选择对错没什么大不了的。我祈祷所有相关的人都能忽略这份愚蠢。每个人都有问题，而我不再是问题的一部分了。我现在可以停止担忧了，这一切都是个错误。我想说的就这些。","tags":["43岁","蒙哥马利"]},{"name":"Keith Clay","text":"首先，我想对全能的主上帝说，我很抱歉，请宽恕我在这世上生活的35年里所犯下的每一项罪。对瓦尔盖塞一家，我请求你们原谅我，因为我知道你们遭受了巨大的损失，我真的、真的很抱歉。我知道你们经历了什么，但请给予我你们的原谅。我真的很抱歉，没有一天我不为你们祈祷。对我的妈妈，我爱你。我要去见主了。耶和华是我的牧者。让每个人都知道我爱他们；这不是永别。我们稍后会再见。","tags":["35岁","哈里斯"]},{"name":"Bobby Cook","text":"我想对受害者的家人说，如果这句话被记录在案，我知道他们承受了悲痛，我也知道这次处决不会给他们带来任何解脱。我的死只会让他们想起他们的亲人霍尔德先生。我想对他们说：'请原谅所发生的一切；那是自卫……我始终没能站上证人席告诉他们这些。'我知道这是错的。我要回主那里去了。","tags":["41岁","安德森"]},{"name":"Richard Williams","text":"发言：我想做的声明是向所有我爱的人——以及亚伯拉罕和威廉姆斯两家人。我们在这场悲剧中走了很长的路——从仇恨到爱，我想为我给我双方家人造成的痛苦道歉。我看着你，弗兰克先生：我为发生在你姐姐身上的事感到抱歉，兄弟，希望有一天你能原谅我。请求上帝宽恕我，并请求上帝宽恕你，让我通过。我的兄弟法鲁克，我爱你，我的兄弟，把我所有的爱送给我的家人。我并不是他们所说的怪物。我犯了一个错误，这个错误代价沉重——但它们不会再付出代价了。我把所有的爱和祝福都留给你们。愿安拉祝福你们每一个人。","tags":["33岁","哈里斯"]},{"name":"Henry Dunn, Jr.","text":"发言：对我所有的家人和朋友，我想让你们知道我非常爱你们。我感谢我们在一起的时光，无论好坏。我会永远记住你们，永远爱你们。对韦斯特一家，我希望你们能从心中找到宽恕和力量，继续前行并找到平安。","tags":["28岁","史密斯"]},{"name":"Granville Riddle","text":"我只是……（用法语说）。我爱你们所有人。我爱你，伦迪，利瓦伊，我的爸爸。我对任何人、或任何出错的事情都没有怨恨。我想对世界说，我一直是个好人。我从来没有过刻薄的心肠或残忍。我祝愿所有人一切安好。","tags":["33岁","波特"]},{"name":"Richard Dinkins","text":"书面致汤普森女士和卡特勒女士的家人。我对所发生的事感到抱歉，是因为我她们才离世。如果有任何办法可以改变事情，让她们回来，我会去做。但我做不到。因为我所造成的事情，许多人受到了影响，对此我非常抱歉。我已经与上帝和好，我祈祷很快每个人都能在他们的心灵和生活中得到解脱。对我的家人和朋友，我爱你们，总有一天我们会再次团聚。","tags":["40岁","杰斐逊"]},{"name":"Alva Curry","text":"我祈求在上帝的帮助下，你们能原谅我给你们家庭带来的痛苦。我真心感到抱歉。我希望我能收回这一切，但我只能祈祷和恳求你们的原谅。","tags":["32岁","特拉维斯县"]},{"name":"Robert Lookingbill","text":"我想感谢所有站在那边的亲人们，感谢你们这些年来对我的善意和支持。要坚强。不要仇恨，而是从这次经历中学习。不要因为事情发生了就认为上帝不在乎。祂会与你同在。我会与你们所有人同在。我爱你们所有人，感谢你们所有人。你们不会被遗忘，外面有很多人爱你们。认识你们所有人是一种祝福。这对我们任何人来说都不容易。不要为我的处境感到难过，因为我自己并不难过。我依然忠诚，依然坚强。把我的爱献给外面的每个人。不要忘记我，有机会时为我点一支蜡烛。我爱你们所有人。","tags":["37岁","伊达尔戈"]},{"name":"John Baltazar","text":"无","tags":["30岁","纽埃西斯"]},{"name":"Samuel Gallamore","text":"书面：我有很多话想说，但没有什么比我对肯尼先生和夫人，以及阿诺特女士的感受更重要。我想道歉并说对不起，但言语显得如此空洞和廉价。他们的死亡本不该发生，但确实发生了。我很抱歉这一切发生了。现在我也摧毁了我的家庭，但在过去的几分钟里，我的心因得到肯尼先生和夫人以及阿诺特女士家人的宽恕而成长。谢谢你们。你们给我的希望比很长一段时间以来都要多。如果我能改变事情，我会去做，不是为了我自己，而是为了这些年来所有爱我的人，以及那些原谅了我的人。感谢你们给予我的一切。","tags":["31岁","科马尔"]},{"name":"Craig Ogan","text":"首先我要说，本案中真正的暴力犯罪是詹姆斯·博斯韦尔和克莱·摩根·盖恩斯的行为。我们有物证证明存在捏造和掩盖。那些导致我死亡的人将为一场无端的谋杀而双手沾满鲜血。我无罪；我是在自卫和本能反应下面对一名失控的警察。詹姆斯·博斯韦尔曾头部遭重击；可能因此出现了问题。我的陪审员们并未听说过此事。他们不知道他在五个月前被一名毒贩殴打导致头部受伤；他满怀愤怒，并向《休斯顿纪事报》写了一封愤怒的信。他对市长、警察局长和消防局长表达了不满。他憎恨这个世界。三个半月前，我与缉毒局达成一项交易，线人被释放。他离开法庭的那一刻，便对我感到愤怒；博斯韦尔警官对此很不快。博斯韦尔警官和一名愤怒的女子坐在警车里，大声交谈。换句话说，在我走上去的时候，博斯韦尔警官正处于愤怒中。博斯韦尔警官可能对……（罪犯话未说完便停止。）","tags":["47岁","哈里斯"]},{"name":"James Powell","text":"我已准备好接受最后的祝福。","tags":["56岁","牛顿"]},{"name":"Calvin King","text":"我想说，神宽恕，就如我宽恕一样。神是最伟大的。谢谢。","tags":["48岁","杰斐逊"]},{"name":"Rex Mays","text":"我想做最后的祈祷：亲爱的天父，我今天来到您面前，主啊，感谢您赐予我与您同在天堂的机会。我请求您宽恕那些需要被宽恕的人。亲爱的主，救我们脱离邪恶，赐予我们所需的安慰、平静和喜悦。亲爱的主，我现在请求您与每一位见证人同在，扶持他们，使他们立于稳固之地。让他们知道所发生的一切，愿我们都能再次相见。阿门。我要感谢每一位见证人：考克斯女士、怀特塞德、里德、斯科特和查德。我今晚将去见耶稣，并为你们每个人预留一个特别的位置。在无人支持的时候，你们一直在我身边。感谢你们所有的爱和支持。请知道我已经准备好了。你们都知道我所经历的。我将去一个与主同在的更美好之地。我唯一感到愤怒的是，我留下你们，而我要去更好的地方。你们仍需经历这人间地狱。请记住美好的事物，而非糟糕的。你们都被爱和尊重着。典狱长，请准予我假释，让我回家与主同在。","tags":["42岁","哈里斯"]},{"name":"Ron Shamburger","text":"很多人总是问是否有天堂，我说有。有天堂也有地狱。他们问：“谁去天堂？”我相信是那些将信仰寄托于耶稣基督的人。罗马书3:25：因为世人都犯了罪，亏缺了神的荣耀。罗马书6:23：罪的工价乃是死，惟有神的恩赐，在我们的主基督耶稣里，乃是永生。罗马书5:8：惟有基督在我们还作罪人的时候为我们死，神的爱就在此向我们显明了。罗马书10:9：你若口里认耶稣为主，心里信神叫他从死里复活，就必得救。约翰福音3:16：神爱世人，甚至将他的独生子赐给他们，叫一切信他的，不至灭亡，反得永生。很多人忘记了约翰福音3:36：信子的人有永生；不信子的人得不着永生，神的震怒常在他身上。在这生命里，我们犯罪并犯错：约翰一书1:19：我们若认自己的罪，神是信实的，是公义的，必要赦免我们的罪。几天前有一节经文跳入我的脑海。诗篇99:8讲到神的圣洁，祂对百姓是赦免的神，但也报复他们的恶行。我在这里不是因为对主耶稣的信仰，而是因为我自己的行为。致贝克一家，我为给你们带来的痛苦和悲伤深感抱歉。我真的不知道该说什么，但对不起——请原谅我。致我的父母，我为给你们带来的痛苦感到抱歉。请原谅我；感谢你们的爱。","tags":["30岁","布拉索斯"]},{"name":"Jessie Patrick","text":"无","tags":["44岁","达拉斯"]},{"name":"Tony Walker","text":"口述：我想向我在瑞士的好朋友迭戈道别。感谢他多年来给予我的所有帮助和支持。我在英国的一位朋友。野花：我爱你，永远不会忘记你。还有我的家人。就这些了。","tags":["36岁","莫里斯"]},{"name":"Claude Jones","text":"对你的家人，啊，我希望这能让你们得到一些了结。我为你们的失去感到难过，嘿，我爱你们所有人。我们走吧。","tags":["60岁","圣哈辛托县"]},{"name":"Toronto Patterson","text":"我为造成的痛苦道歉：对不起我给朋友、家人和亲人带来的伤害。我对所有这些罪行感到巨大的责任和内疚。我应因罪行受罚，但我不认为我应因一项我没有犯下的罪行而死。对不起，但没有什么能让金姆、奥莉和吉吉回来。但我祈祷我的死能为我的家庭带来和平，或许能团结这个家。我请求你们的宽恕，希望你们都能原谅我。我没有敌意；我心存平静，邀请你们所有人参加我的葬礼。我们仍是一家人。我爱你们所有人，妈妈、迪德拉阿姨、家人和每一个人。我爱你们。我准备好了，典狱长。","tags":["24岁","达拉斯"]},{"name":"Gary Etheridge","text":"是的，先生。对受害者家属，我为被夺走的一切感到抱歉。希望你们找到平静。对我亲爱的克劳迪娅，我爱你。保持坚强，继续建设，小心。小心。我爱你。我说完了。","tags":["38岁","布拉佐里亚"]},{"name":"Javier Medina","text":"首先，我想向卡德纳家族的成员道歉，无论我给你们带来了怎样的伤害和痛苦。过去一直没有这样的机会，不是我不知悔改，只是时机从未成熟。请原谅我，希望你们能从心底宽恕我。你们将找到的安宁只是暂时的，真正的安宁需要通过找到基督来获得。我祈祷通过这次行刑，你们能寻得所渴望的安宁。将自己交托给基督，通过他找到安宁。我时常思念你们的亲人，他会在天堂等我。我将能与他交谈，亲自请求他的宽恕。对我的家人，我感谢并爱你们，谢谢你们一直在我身边支持我。这只是通往家园的一个台阶。在被判死刑的这些年里，这是最艰难的部分。对所有支持我的人，你们永远在我心中，正如我一直你们心中。愿上帝保佑你们。抬起头来，我们很快会再相见。请原谅我给你们带来的痛苦。（西班牙语）对所有的墨西哥人民，我想感谢你们的帮助。我也想把你们每一个人都装在心里。如果你们要抗议，我不希望你们对这些人做出任何过激行为。他们已经承受了足够的痛苦。墨西哥万岁。以荣耀举起墨西哥的旗帜。感谢一切。我爱你们。（英语）对所有死刑犯说，保持你们的尊严，我们还会再见。我真心感到抱歉，愿你们能从中找到平静。请原谅我带来的痛苦。愿上帝保佑你们，我爱你们所有人，我已经准备好回家了。","tags":["33岁","达拉斯"]},{"name":"T.J. Jones","text":"我想对家属说，我对我给你们带来的痛苦感到遗憾，希望有一天你们能够释怀。妈妈和爸爸，我爱你们。保重。我准备好了。","tags":["25岁","Gr鸡蛋"]},{"name":"Richard Kutzner","text":"嗯，是的，先生。丽贝卡，我理解你一直盼着这一天，你达成了心愿。我没有杀害你的母亲。为我工作的那两个人杀害了你的母亲，而他们仍然逍遥法外。如果麦克杜格尔先生允许进行DNA证据鉴定，我早就被证明清白了。托尔森先生，我明白你在听。如果这个世界上还有任何正义，请利用这个机会，阻止其他人重蹈我的覆辙。典狱长，这和杀害丽贝卡母亲的人所犯下的谋杀一样，都是谋杀。送我回家吧。","tags":["59岁","蒙哥马利"]},{"name":"Jeffrey Williams","text":"耶和华是我的牧者，我必不致缺乏。他使我躺卧在青草地上，领我在可安歇的水边。他使我的灵魂苏醒，为自己的名引导我走义路。我虽然行过死荫的幽谷，也不怕遭害，因为你与我同在；你的杖，你的竿，都安慰我。在我敌人面前，你为我摆设筵席；你用油膏了我的头，使我的福杯满溢。我一生一世必有恩惠慈爱随着我，我且要住在耶和华的殿中，直到永远。阿们。阿们。","tags":["30岁","哈里斯"]},{"name":"Napoleon Beazley","text":"我犯下的让我沦落至此的罪行不仅令人发指，而且毫无意义。但犯下那罪行的那个人已经不在了——现在站在这里的是我。我不会对任何束缚进行身体上的挣扎。我不会大喊大叫，不会使用污言秽语，也不会进行空洞的威胁。但请明白，我不仅感到不安，更因今晚这里发生的一切而感到悲伤。我不仅感到悲伤，更感到失望，一个本应保护、维护正义与公正的制度，竟会像我当初犯下同样可耻错误时一样。如果有人试图因为参与这场杀戮而处置这里的每一个人，我会响亮地喊出“不”。我会告诉他们，给予他们所有人他们不愿给予我的礼物……那就是给他们所有人第二次机会。我为自己在这里感到抱歉。我为你们都在这里感到抱歉。我为约翰·勒蒂格的死感到抱歉。我也为我内心深处的一些东西导致了这一切的发生而感到抱歉。今晚，我们告诉世界，在正义的眼中没有第二次机会……今晚，我们告诉我们的孩子，在某些情况下，在某些案件中，杀戮是正确的。这场冲突伤害了我们所有人，没有所谓的“双方”。支持这一程序的人认为这是正义。认为我应该活下去的人也认为这是正义。尽管看起来可能艰难，但这是理想的碰撞，双方都执着于他们认为正确的东西。但如果最后我们都是受害者，那谁又是错的呢？在我内心深处，我必须相信，在我们的理想之间存在着和平的妥协。即使对我而言没有妥协，为了那些尚未到来的人，我也并不介意发生。在死囚区有很多像我一样的人——好人——他们也曾陷入同样被误导的情感，但可能没有像我一样走出来。给那些人一个机会去做正确的事。给他们一个机会去弥补他们的错误。他们中的许多人想要收拾他们惹下的烂摊子，但不知道如何下手。问题不在于人们不愿帮助他们找到方法，而在于制度告诉他们无论如何都无关紧要。今晚没有赢家。没有人能释怀。没有人能得意洋洋地离开。","tags":["25岁","史密斯"]},{"name":"Johnny Martinez","text":"首先，我想说，我要向克莱·彼得森的父亲道歉。对不起。我还要感谢你所做的一切努力；这对我来说意义重大。我要感谢大卫·多；你一直待我很好，我知道我即将死去——但不是为我的错误而死。是我的审判律师——是他们害死了我。我爱我的家人，我知道我将去往何处。你们多保重——塞莉娜、大卫，还有告诉妈妈我也爱她。我没给她打电话，因为我实在做不到。我会去天堂，我们会在那里相见。汤姆·克劳奇，还有各位，我爱你们。基娅拉，谢谢你做的一切。弗雷德、雷切尔、丹尼尔、奥拉莉亚——谢谢你们在我身边。我的精神会与你们同在。大卫·多，你一直都很棒。玛丽·莫雷诺，来自科珀斯克里斯蒂《呼叫者时报》，谢谢你写下的文章。你一直都很真诚，我本想和你谈谈，但他们不允许。大卫·多，让他们知道发生了什么。我很好，我很开心，我们会在另一边相见。","tags":["29岁","纽埃西斯"]},{"name":"Ronford Styron","text":"是的，先生。谢谢你们。我爱你们所有人，我想让你们知道这一点。你们总是告诉我不要担心自己。我更担心你们，因为我知道我将去往何处。我希望在那里见到你们，所以请端正你们的心。你们知道我爱你们、关心你们。我要去和我儿子一起玩耍了。你们多保重，我爱你们所有人。我爱你们。威尔科克斯牧师、罗杰、罗宾、莎拉、奶奶。我爱你们。你们都保重。主耶稣，我看到了你的灵，一切都好。我爱你们。","tags":["32岁","利伯蒂"]},{"name":"Reginald Reeves","text":"愿我们都能学会爱与宽恕，从而在世间获得和平。唯有心怀仁爱、懂得宽恕，并在生活中学会爱、为爱而活，我们才能领悟宽恕的力量，学会在这片大地上如兄弟姐妹般共处。否则，这类事将会不断重演——比如死刑；如果我们不去宽恕，终将自取灭亡。你需要敞开心扉，让上帝进入。我为我夺走你女儿的生命而道歉，我知道你一定承受着巨大的痛苦，因为今天我也见到了我的家人。虽然我的痛苦不如你深切，但我深感愧疚。今天，这并不能带给你平静，因为这并非正道。我们应当宽恕与相爱，我竭尽身心向你道歉，我爱你，我知道你的灵魂与上帝同在，我们同属人类这个大家庭；我们必须学会彼此相爱、和睦共处。我们来世再见。感谢你的款待。","tags":["28岁","雷德河"]},{"name":"Daniel Hittle","text":"山塔贾伊布·辛格·吉。","tags":["50岁","达拉斯"]},{"name":"Rodolfo Hernandez","text":"是的，先生。我要感谢我的精神导师沃尔什神父、怀特塞德先生、艾琳·威尔科克斯和她的丈夫杰克，还有理查德·洛佩兹，感谢他们在此过程中一直陪伴着我。我没看到奥布莱恩。哦，他就在那儿。感谢所有人。大家都会平安无事，因为你们都将前往我将去的地方。记住我的话，我希望在那里与你们相见。我要表达感谢。上帝啊，请来实行您的旨意吧。我准备好了，典狱长。","tags":["54岁","科马尔"]},{"name":"Gerald Casey","text":"无","tags":["47岁","蒙哥马利"]},{"name":"William Burns","text":"我只想告诉妈妈，我很抱歉给她以及我的家人带来了如此多的痛苦。我爱他们，想到他们将会伤心，我也感到难过。我真的很讨厌这样；我希望他们能挺过去。","tags":["43岁","鲍伊县"]},{"name":"Jose Santellan, Sr.","text":"首先，我要向瓜哈尔多家人道歉，尽管他们不在场。我非常爱约兰达。我真心希望并祈祷他们能原谅我带来的所有痛苦。对我的家人，请坚强。汤姆、奥兰多、塞莉亚，请坚强。迈克尔，谢谢你的友谊。谢谢你给予我的支持。我感谢你们所有人，我爱你们所有人。对死囚牢房里的兄弟们，请坚强，希望有一天能再见到你们。再见，我爱你们，别为我担心。一切都会好起来的。","tags":["40岁","克尔"]},{"name":"Gerald Tigner","text":"是的。这是我的遗言。1993年8月31日，在第十街，针对迈克尔·沃特金斯和詹姆斯·威廉姆斯的罪名，我是被错判的。我因一份虚假供词而被定罪，因为我从未承认过，但我的律师并未向陪审团说明这一点。我没有杀害那些毒贩。我将爱送给我的家人和朋友；东区的家人和朋友。我以真诚对待真诚。这才是最重要的。我们后会有期。就这样了。","tags":["29岁","麦克伦南"]},{"name":"Dorsie Johnson, Jr.","text":"我想告诉我的家人，我爱他们，永远坚强，昂首挺胸，坚守对耶稣的信仰。","tags":["30岁","斯卡里"]},{"name":"Randall Hafdahl, Sr.","text":"说出来的：是的，我有。我完整的遗言将以其他方式公布，而不是在此由我亲自说出。我只想说，我爱你们所有人。大约28年前，我记得低头看着一个摇篮，我看到了一位天使。我现在正看着她。我爱你，科琳。我们走吧。路永无止境，派对永不散场。让我们摇滚起来吧。走吧，典狱长。我和你，我们所有人。记住湿威利——保持微笑，保持微笑。我爱你。它就要来了，我能感觉到。没事的，宝贝。我们有个派对要去。我现在就能感觉到。","tags":["48岁","兰德尔"]},{"name":"Windell Broussard","text":"是的，典狱长。我只想让大家知道，这是一场悲剧。发生在戴安娜、科瑞身上的事，以及现在发生在我身上的事……都是一场悲剧。就这些了，典狱长。","tags":["41岁","杰斐逊"]},{"name":"Jermarr Arnold","text":"是的，先生。桑切斯夫人的家人，还有其他在场的朋友。就像我说的，我对1983年令嫒的离世负责。我深表歉意。我也是人，我知道那种感受，我也经历过。我无法解释，也不能给你们答案。但我能给出一件事，今天我会做到：以命偿命。我祈祷你们不会有怨恨或敌意。你们有权看到这一切，我很高兴你们在这里。我只能祈求上帝的宽恕。我这样说并非轻率，我是在献出我的生命。希望我的死刑能给你们带来一丝安慰。对我而言，我很平静，所以你们看到我在微笑。我很高兴离开这个世界，我要去一个更好的地方。我已与上帝和解，我获得了重生。谢谢你们前来，我很抱歉。希望你们能放下任何恶意或仇恨，因为它们只会带来悲伤和痛苦。我对令嫒的离世负责，我无法给出答案，希望你们未来能找到平静。愿上帝保佑你们所有人。谢谢大家到来。(开始演唱《奇异恩典》)","tags":["43岁","纽埃西斯"]},{"name":"Michael Moore","text":"首先，我想说我爱你们所有人。我会在那里等你们到来，别让我失望。我将带着基督的恩典在那里。我们都会在那里。我保证我会微笑着离去。我很抱歉。如果词汇中有比“抱歉”更强烈的词，你们应该听到。我无法收回我所做的一切。我祈求基督的宽恕，也请求你们原谅我。我理解你们的感受。愿上帝保佑你们所有人。我会在那里等你们到来。别让我失望。愿上帝保佑每个人。","tags":["31岁","科耶尔"]},{"name":"Vincent Cooks","text":"告诉家人我爱你们。照顾好妈妈。不想说太多，我会哭的。我会哭得到处都是。对不起，老师，我没当好儿子，没做出更好的事。这不是你的错。你按自己的方式养育了我，至少我不再在那里了。我也想你。我看见你在那儿，你还好吗？我给你寄了一封信。颈骨，有张纸，上面写着你的名字。继续写，亲爱的。查尔斯，保持右转。你们那边的人。你们知道这些人在干什么。他们处决我根本解决不了问题。我体重不到180磅，身高5英尺7寸。保重，我爱你们。罗杰来这儿了吗？告诉帕特他们我爱他们。我继续让他们做他们要做的事。帮帮你姐姐，再见帕特，爱你贝卡。做你该做的事吧，典狱长。","tags":["37岁","达拉斯"]},{"name":"Kenneth Harris","text":"感谢各位前来。我为给两个家庭——我的家和你们的家——带来的所有痛苦道歉。","tags":["34岁","哈里斯"]},{"name":"Emerson Rudd","text":"好吧，那就由我来对摩根一家说吧。摩根太太，是庭审时那位姐姐吧——大约十三四年前，我当时确实麻木不仁。在那起抢劫案里，我很抱歉开枪打死了您的儿子。政客们总说\"死亡能带来终结\"，可我的死换不回您儿子的命，更谈不上什么终结。我多希望能多补偿些什么，但已无能为力。但愿这番话能让您内心安息。乌尔苏拉、玛侬、艾琳，我爱你们，保重——他们必须执行这个程序。催泪瓦斯的效果还没完全消退，我感觉身上还热着。我爱你们。我准备好了，走吧。给我妈妈打个电话，告诉她这一切都结束了。告诉兄弟们：昂起头，望向天空。","tags":["31岁","达拉斯"]},{"name":"Jeffery Tucker","text":"我想对汉弗莱家人说，我对给你们造成的痛苦和折磨深表歉意。我从未想杀害你们的丈夫和父亲，那只是一场意外。我真诚地为所有痛苦和悲伤感到悔恨。我意识到我的行为导致了死亡和巨大的痛苦。我祈祷耶稣能带给你们平静。我只希望我的死亡能给你们带来安慰和慰藉。如果我的死能带来这些，我会欣然接受。我知道我因所犯之罪离开这个世界。对朋友们，杰克和艾琳·威尔科克斯，祝福你们，你们是我坚实的依靠。艾琳，你像母亲一样；杰克，你像父亲一样。对我的律师，丹纳林和罗伯特·欧文，你们不仅是我的律师，更是我的朋友。我知道你们对我停止上诉感到不满，但你们明白原因。谢谢你们的理解。请怀着欣慰的心，知道我平静地离开这个世界。沃尔什神父，你帮助我认识主。没有你，我永远不会理解。你给了我耐心和勤奋。总有一天我会在那里见到你。我会在那里等你，但不用着急。你还有很多工作要做。要知道我会守护着你们。我爱你们所有人，感谢你们是我生命的一部分。(背诵主祷文)","tags":["41岁","帕克县"]},{"name":"Gerald Mitchell","text":"是的，先生。马里诺先生的母亲在哪里？你收到我的信了吗？我想让你知道，我信中所写的一切都是真心的。我为造成的痛苦道歉。我为从你身边夺走的生命道歉。我祈求上帝的宽恕，也同样请求你们的原谅。我知道这很难，但我为我的所作所为感到抱歉。对我的家人，我爱你们每一个人。要坚强。要知道我的爱永远与你们同在……永远。我知道我要回家与主同在。请为我流下喜悦的泪水。我爱你们每一个人。继续生活下去。贝蒂，你一直很棒。你引导我走向主。你像母亲一样待我。肖恩、拉斯蒂、珍妮、玛莎，愿上帝保佑你们每个人。耶稣，我承认你是我的主和救主。我知道我死后，会在天堂拥有永生。我已准备好迎接你应许我的那座殿堂。保重。没关系，肖恩，没关系。我要去一个更好的地方。","tags":["33岁","哈里斯"]},{"name":"James Knox","text":"无","tags":["50岁","加尔维斯顿"]},{"name":"Jeffery Doughtie","text":"将近九年来，我一直在思考死刑是对还是错，我没有答案。但我不认为没有我，世界会变得更好或更安全。如果你想惩罚我，你本可以在第二天处决我，而不是现在。现在你伤害不了我。我有时间准备，向家人告别，把生活安排好。它始于一根针，也终于一根针。卡尔，你一直是个好朋友，伙计。我会去找你的。你回去告诉你女儿我爱她。告诉她我像一个男人一样进来，也会像一个男人一样离开。很好，伙计。谢谢你，肖蒂。我很感激你。我像一个男人一样进来，也会像一个男人一样离开。我会与你同在。每次你洗澡时我都会与你同在。如果你哭着离开，你就对不起我。如果你在我眼中看不到平静，你就没有看到真正的我。当你跨越生死时，我会是你第一个见到的人。他们给了我今天打的那些号码，打给我的家人。就这样了。准备好了，典狱长。","tags":["39岁","纽埃西斯"]},{"name":"Jose Gutierrez","text":"伊莎贝尔妈妈让我向你们问好。圣哉，圣哉，圣哉！全能大主宰！清晨我众歌声，穿云上达至尊；圣哉，圣哉，圣哉，慈悲与全能！三位一体真神，永受颂赞。圣哉，圣哉，圣哉！慈悲与全能。万民齐声赞美，三一妙身；圣哉，圣哉，圣哉，慈悲与全能！三位一体真神，永受颂赞。哦，我们在天上的父，愿人都尊你的名为圣。愿你的国降临，愿你的旨意行在地上，如同行在天上。我们日用的饮食，今日赐给我们。免我们的债，如同我们免了人的债。不叫我们遇见试探，救我们脱离凶恶。因为国度、权柄、荣耀，全是你的，直到永远。阿们。现在，父啊，我将我的灵魂交在你手里。阿们。","tags":["39岁","布拉索斯"]},{"name":"Mack Hill","text":"首先，我想告诉我的家人我爱他们。我会等着他们。我很好。我希望每个人都能从这件事中得到解脱。我是无辜的。拉伯克县的官员认为我有罪。但我不是。特拉维斯·韦尔有责任证明他没有犯下重罪。必须制止他，否则他会一次又一次地这样做。作为公职人员，你有责任履行职责。就这样，典狱长。我爱你们。2008年6月25日。","tags":["47岁","拉伯克"]},{"name":"James Wilkens","text":"桑迪，以及所有你们，我很抱歉。请听我说。请以上帝的名义原谅我。请理解。请找到那份平静。我真的非常抱歉。请为了你们自己原谅我。你们所有人，请。我爱我的妹妹、朋友、父亲。谢谢你们爱我、陪伴我。你们是了不起的人。上帝对我的恩赐超过了我应得的。我想以祈祷结束。天父，我来赞美感谢你，即使现在，我也能承受你为我在十字架上受死时所忍受的痛苦。你已赦免了我的罪过和暴行。主啊，谢谢你赐给我力量。也赐给他们力量来原谅我。请他们在心中原谅我。我求你触动他们每一个人。我真心忏悔。奉耶稣基督之名，我爱你们。典狱长，我准备好回家了。请记住，上帝是平安，上帝是爱。","tags":["39岁","史密斯"]},{"name":"Miguel Richardson","text":"我爱你们，我爱每一个人，我带着无尽的爱与敬意走向世界。今天是个伟大的日子，去传承。这所谓的死亡。今天是个伟大的日子，去迎接这荣耀的时刻。迎接当下。(含糊不清) 愿你的旨意成就。(更多的含糊不清) 我爱你们所有人。不要浪费你们的时间在争吵和斗嘴上。上帝爱你们所有人。真正重要的唯有爱。爱是我们唯一拥有的。没有爱就没有圆满。彼此宽恕。你们必须学会如何宽恕和拥抱彼此。合而为一。我们的爱就像是……它是上帝的甘露。当我们发自内心给予时，我们能给予的太多。心灵是浇灌生命之树的许愿井。我期盼并渴望一件事。我只盼望你们所有人都能获得最好的。(未知的语言) 我爱每个人和孩子心中的那份爱。人类是我的家人和族群。我准备好了，格鲁玛。一位诗人曾说过，‘……是我的国家。你我之间没有隔阂，没有敌人，只有家人。我是爱的使者。我走出去爱每一个人和每一件事物。上帝保佑我的……国家。我流下爱的泪水，愿它们滋养每一个人。停止杀戮，开始爱人。停止暴力。让我的死亡改变社会。你们不需要更多的杀戮。你们不需要任何最低、最高安全级别的死囚牢房。你们不需要死刑。我们需要更多充满爱心的父亲和母亲。今天是死去的吉日。上帝啊，请带走我，把我拥入怀中，带我回家。","tags":["46岁","贝萨尔"]},{"name":"John Wheat","text":"我对所发生的事深感遗憾。我并非故意或明知地伤害任何人。就这样吧，带冒（越南语：我们离开这里吧。）","tags":["57岁","塔兰特"]},{"name":"David Goff","text":"我要将所有的赞美和荣耀归于上帝，感谢他为我所做的一切。借此，让我所欠的一切债务——无论是真实的还是想象的——都得到清偿。一切过往一笔勾销，所有标记都已抹去，除此之外，没有正义。那不是正义。赞美主。荣耀归于耶稣基督。赞美主上帝。","tags":["31岁","塔兰特"]},{"name":"John Lamb","text":"对不起，我希望我能让他们回来。我说完了，来吧。","tags":["42岁","亨特"]},{"name":"Desmond Jennings","text":"无","tags":["28岁","塔兰特"]},{"name":"Jason Massey","text":"是的，首先我想对受害者的家人说几句话。首先，我想说，我不认识你们中的任何一位，这很不幸，因为我本想向你们每一个人亲自道歉。我无法想象我从你们那里夺走了什么，但我确实想道歉，并且我想让你们知道，我确实做了那件事。你们知道我有罪，我为我的所作所为感到抱歉。我道歉，我知道你们今生今世或许无法原谅我，但我希望将来的某一天，你们能在我身上找到原谅我的力量。我想让你们知道，克里斯蒂娜，她遭受的痛苦没有你们想象的那么多。我向你们保证。我向你们承诺。我知道你们想知道她其余遗骸的下落。我将她的遗骸投进了三一河。自从我来到死囚牢房就一直这么说。我再次向你们道歉。我希望将来的某一天你们能原谅我。好了，现在我想对我的母亲和我的家人说几句话。安德森兄弟，凯西，我想让你们知道，我感谢你们这些年来一直来死囚牢房看我，爸爸，我爱你。我感谢你们在这里为我坚强。妈妈，你知道我爱你，我感谢你所有的探望、信件以及你们为我做的一切。你们一直都很棒。还有您，奶奶。我爱你们，并且，我也想为我所做的一切向你们道歉。为我所造成的所有痛苦道歉，但这些痛苦让我们更加亲密，所有这些我们经历的苦难让我们更加亲近主，而这最终才是最重要的。不是吗？最终重要的是：你在全能的上帝面前站在何处。我知道上帝利用这来改变我的生命。正因如此，这一切都值得。如果今天我躺在这里，面对死亡，我可以说，耶稣是主。他改变了我的生命，我知道当我离开这副躯体时，我将回家，永远与主同在。这就是我想说的全部。我爱你们，我不会说再见，我会说我们还会再见。我爱你，爸爸。今晚我将在黄金之街上起舞。让无罪的人先扔石头。","tags":["28岁","埃利斯县"]},{"name":"Dennis Dowthitt","text":"我为你们所经历的一切感到非常抱歉。我为你们所有人所经历的一切感到非常抱歉。我无法想象失去两个孩子。如果我是你们，我会杀了我自己。你知道吗？我真的为此非常抱歉，我真的。我得走了，姐妹。我爱你。你们多保重，上帝保佑你们。格雷西很漂亮，蒂芙尼也很漂亮。你们有一些可爱的女孩，我很抱歉。我不知道该说什么。好了，典狱长，我们开始吧。","tags":["55岁","蒙哥马利"]},{"name":"Adolph Hernandez","text":"我想感谢我的家人给予我的帮助、道义支持和他们的努力。如果没有他们的爱，一切会艰难得多。所以，我只是要回家了。有一天我会再见到你们。只是不用着急。我会一直在那里。我会永远守护着你们。我爱你们。好吗？你们要坚强。上帝保佑你们。那就是我要去的地方。我爱你们，嗯。我们会在德克萨斯州斯莱顿再见。上帝啊，我将我的灵魂交托给你。(西班牙语) 我们都赞美上帝。(西班牙语) 阿门。照顾好我的家人。(西班牙语) 我爱你们。就这样吧，典狱长。","tags":["50岁","拉伯克"]},{"name":"Caruthers Alexander","text":"无","tags":["52岁","贝萨尔"]},{"name":"Alvin Goodwin","text":"他用爱尔兰语发言，翻译过来是‘再见’。","tags":["37岁","蒙哥马利"]},{"name":"Jack Clark","text":"首先，我想对家属说，我很抱歉，我恳求你们的原谅。在圣托马斯教堂还会有一场葬礼弥撒，我想邀请州里的所有人和家人们，如果他们愿意的话可以来参加。我最后的遗言是：他是从创世之初就照耀在所有人心的光。我们若承认自己的罪，他是信实公义的，必要赦免我们的罪，洗净我们一切的不义。平安与良善。","tags":["37岁","拉伯克"]},{"name":"James Earhart","text":"无","tags":["56岁","李"]},{"name":"Garry Miller","text":"玛吉，对不起。我一直想告诉你，但我不知道怎么说。我一直在为你们祈祷。我希望你们能找到一直渴望的安宁。主啊，感谢你赐予我的所有家人、所有朋友，以及和我在牢房里的所有兄弟。感谢你赐予我的属灵家人。主啊，请怜悯那些积极参与夺走我生命的人，请原谅他们，如同我原谅他们一样。求你怜悯我这个罪人。当我们苏醒时，求你保护我们，在我们沉睡时看顾我们，使我们醒来能与基督一同守望，在他的平安中安息。好了，典狱长。我准备好回家了。","tags":["33岁","琼斯县"]},{"name":"Tony Chambers","text":"妈妈，我只想让你们知道我爱你们。无论生活中发生什么，我希望你们保持坚强。多琳，你也一直是我生命中非常特别的一部分。我希望你继续做你正在做的事。保持坚强。爸爸，我希望你保持坚强。","tags":["32岁","史密斯"]},{"name":"Stacey Lawton","text":"我想说，我希望你们都振作起来，坚持下去，为每一个人都保持坚强。我是说，我不想你们把我当成一个杀手什么的，因为我不是杀手。我没有，我没有杀你们的父亲。我知道这看起来像，但我没做过。你明白我的意思吗？汤米，你那时和我在一起。你知道的，老兄。我一直想对你们说点什么。对吗？我不能承认我做过，因为我没有。我爱每一个人。我现在是基督徒了。我希望大家都振作起来，保持坚强。我也会保持坚强。我会再见到你们的，这是我最后的话。瑞奇，振作起来，孩子。你们所有人，多琳，梅洛迪。我知道你们不会来这里。我真的不知道你们想让我说什么。我是说，我知道，呃，我很抱歉，任何人，那天晚上有人死了。本不该发生的，但我没做。我真的没做。我不希望你们一辈子都以为是我做的。你明白我的意思吗？我爱每一个人，我希望你们都保持坚强。对吗？这可能需要一个小时或很长时间，老兄，但我不想耽误你们，那样。你们就振作起来，保持坚强吧，老兄。替我向所有人问好。我爱你们。","tags":["31岁","史密斯"]},{"name":"Miguel Flores","text":"我想感谢我的律师，沃尔什神父……西尔维娅，我非常爱你，也感谢领事馆，我想说非常感谢你们所做的一切。我想说我很抱歉，我今天为你们祈祷，希望你们能获得平静，我希望你们能原谅我。上帝在等待着，上帝现在就在等待。","tags":["31岁","科林"]},{"name":"Jeffery Dillingham","text":"我只想为我所做的向受害者家属道歉。我为那位可怜妇女的死，为给科斯洛先生造成的痛苦和折磨，承担全部责任。天父，我要感谢你赐予我生命中所有美好的人们。我无法奢求你给了我比我的父母更伟大的双亲了。我现在只能为他们生命中能有更伟大的人。这是一种祝福，他们有深爱之人，更甚的是，我也有深爱之人。我感谢你在我生命中所做的一切，感谢你开启我的双眼，柔软我的心灵。感谢你教导我的方式。感谢你教我如何去爱，感谢你从我生命中带走的一切坏事物。感谢你为我增添的一切美好事物。我感谢你在圣言中向我们做出的所有美好应许，我满怀感恩地接受了每一个。感谢天父让我离开死囚牢房，带我出狱回家。我爱你，天父，我爱你，耶稣。感谢你们两位爱我。阿门。","tags":["27岁","威奇托县"]},{"name":"Kenneth Dunn","text":"无","tags":["39岁","哈里斯"]},{"name":"Ricky McGinn","text":"罗宾，你知道这不对。妈妈，亚当，迈克，桑尼，米歇尔，你们都知道我爱你们。告诉大家我向他们问好，告诉他们我爱他们，我们会在另一边相见。好吗？现在我只祈祷，如果有任何针对我的事情，愿上帝将它带走。我不想任何人对任何人生气。我不想任何人怀有怨恨。保持纯洁的心，我们会在另一边再见。好吗？我爱你们，保持甜蜜。我爱你们。","tags":["43岁","布朗县"]},{"name":"Jeffery Caldwell","text":"我想向我的家人和亲戚表达我的爱，感谢你们给予我的所有爱与支持。我特别想向我深爱的女儿表达我的爱。我希望你永远记得我。我希望你永远珍惜我给予你的爱与力量。我对你的爱将永远留在你的心中，成为你灵魂的一部分。至于我所有的兄弟们，我全心全意地爱你们。但当你们离开这个尘世之时，你们将必须面对上帝的审判，因为你们对我的姨妈和表亲们缺乏关爱。我们从小就不是被这样教育的。如你们所知，我们的父母教导我们无论如何都要彼此相爱。但你们对我的姨妈和表亲们没有表现出爱。我可以原谅你们所有人，但你们必须向上帝祈求宽恕，因为你们伤害了我们的姨妈和我们的家庭。我现在就离开，去与我的父母和我唯一的妹妹团聚，他们的生命并非我所夺。致所有死囚牢的伙伴们，我感谢你们给予我的爱与力量。你们都保持振作。至于我的律师们，我感谢你们始终支持我。作为辩护律师，你们给了我很多力量。在我离开这个躯体之时，愿我的爱触及你们每一个人的灵魂。","tags":["37岁","达拉斯"]},{"name":"David Gibbs","text":"布莱恩特先生，我亏欠了您和您的家人，我对此深感抱歉。我选择原谅，也已被原谅。死亡不过是短暂的沉睡和回家的短途旅程。当您到达那里时，我会见到您。我说完了，典狱长。","tags":["39岁","蒙哥马利"]},{"name":"Richard Jones","text":"我想让受害者家属知道，我没有犯下这桩罪行。我没有杀死你们的亲人。莎伦·威尔逊，你们定了一个无辜的人的罪，你们心知肚明。已经聘请了一些律师会证明这一点，我希望你们能承受得住。致我的家人和亲人们，我爱你们。感谢你们支持我。你们都保持坚强。典狱长，带我回家吧。","tags":["40岁","塔兰特"]},{"name":"John Satterwhite","text":"无","tags":["53岁","贝萨尔"]},{"name":"Oliver Cruz","text":"首先，我想向凯莉·伊丽莎白·多诺万的家人道歉。我为十二年前对她所做的事感到抱歉。我希望他们能原谅我所做的一切。我很抱歉。我为自己伤害了家人、伤害了朋友而感到抱歉。耶稣，请宽恕我。带我回家与你同在。我准备好了。我爱你们所有人。","tags":["33岁","贝萨尔"]},{"name":"Brian Roberson","text":"既然我已经对所有我爱的人说完了我想说的话，我现在就不对你们多说什么了。你们知道我爱你们，你们知道我们在哪里。当你们到达那里时，我会与你们相见。这就是我的声明。致所有憎恨黑人的美国种族主义白人，以及所有憎恨自己的美国黑人：请记住我那位著名传奇兄弟马特·特纳的名言：‘你们都来亲我的黑屁股吧。’我们开始吧。","tags":["36岁","达拉斯"]},{"name":"Juan Soria","text":"我希望我们能向宇宙之父真主祈祷。我祈求您的庇护和我的救赎，我的夜晚和我的白天。我愿您引领我，而我跟随。我们赞美神圣的真主和圣洁的先知。我们知道，您是真主，您在当今这个新时代是掌管人类的先知。这两句话（听不清）是对圣子殿堂的主人们说的，我们有幸至少在我们有限的时光被安置在父的居所中，直到这个有限的时间为其指定的时刻到来。一切并不奇怪，爱统治着所有事件，是什么（听不清），谁是谁的父母，我将我的爱延伸给我所有的兄弟姐妹，延伸于生命和我的信仰，这就是真主。它正走向我所来自的南、中、北美洲国家的救赎。（听不清）那将拯救我们。所以，我呼唤我所有的兄弟姐妹，以及仍对何为神圣之爱有所认识的人类同胞。爱来自于你们古老的先祖。爱是由这位先知真主带来的。我们将爱延伸给每一位信奉伊斯兰教、并选择全心全意去爱的人们。我们开始理解什么是有限，什么是无限。我再说一次，能住在我父的居所是一种荣幸。能够亲眼看见这神圣伟大的天堂，用灵性之眼所见，这灵性是由我的先知所启示的（听不清）。我们将爱延伸给每一个人。将我的爱延伸给我的神圣姐妹。多萝西姐妹，和我的兄弟托马斯，我们知道我们的父真主将在未来的日子里保佑他们。我们知道真主此刻并与我们同在，直到永远。据说我将进行手术，所以我想我会在这次手术完成后与大家见面。事情结束了。","tags":["33岁","塔兰特"]},{"name":"Orien Joiner","text":"凯西，你们保重，我祝福你们所有人，我很高兴我的生命中有你们。就像我从一开始就说过的，我是清白的，上帝知道我是清白的，那四个被谋杀的人也知道我是清白的。等我到了天堂，我会去找你们，我们好好谈谈。我为那些不得不受苦的家庭感到难过，我的家人，我也将他们全部放在我的祈祷中。我爱你们所有人。你们保重，照顾好希拉和香农她们，给她们打电话，把照片给她们，还有…… 啊，就像我说的，我为这些家庭感到难过，但如果我的死能让他们好受些，那么我会祝福他们。我对任何人都没有怨恨，因为主觉得是时候让我回到祂身边了，我在世上的工作已经完成。就像我说的，我只是感到抱歉，但他们将不得不再次经历这一切，因为迟早，犯下这起罪行的人会被抓住，他们将不得不回到这里，再次经历这一切，那时他们会意识到，他们目睹了一个无辜的人走向耶稣基督。","tags":["50岁","拉伯克"]},{"name":"Jessy San Miguel","text":"坚强点，兄弟。坚强点，我的兄弟。坚强点，妈妈。会好起来的。我爱你们所有人。别忘了这一点。很讽刺，不是吗？我是一个十字架。你们要互相照顾。我会守护着你们的。谢谢你，达娜... 是的。","tags":["28岁","达拉斯"]},{"name":"Gary Graham","text":"我想说，我没有杀害鲍比·兰伯特。我是一个正在被处决的无辜黑人男子。今晚在美国，这是一场私刑。我的辩护有大量且强有力的证据，但这些证据从未在美国任何法庭得到审理。在这里发生的一切，对任何文明国家、对任何地方的任何人来说都是错误的，无论他们如何看待正在发生的事。我感谢所有支持我事业的人。他们一直站在我身边支持我。那些与我并肩走到最后的人。我想对兰伯特先生的家人说，我没有杀害鲍比·兰伯特。你们正在处决一个无辜的人。我想向你们所有人表达我诚挚的感谢。我们必须继续前进，尽我们所能，在美国将法定私刑定为非法。我们必须继续在世界各地保持坚强，人们必须团结起来，制止对贫穷无辜黑人的系统性杀戮。我们必须继续团结一致，要求暂停所有处决。我们绝不能忘记今晚这场谋杀/私刑，我的兄弟们。我们必须将其带到全国面前。我们必须保持信念。我们必须前进。我们认识到许多领袖已经离世：马尔科姆·X、马丁·路德·金，以及其他为正确之事挺身而出的人。他们为正义挺身而出。我们必须——你们必须，兄弟们——这就是我今天召唤你们的原因。你们必须延续这个条件。这里发生的事情只是一场正在进行的私刑。但如果你们不延续那个传统和抵抗时期，他们会在未来一百年里继续对我们施加私刑。我们会胜利的。我们可能会输掉这场战役，但我们会赢得战争。这场死亡、这场私刑将被报复。它会被报复，它必须被报复。人民必须为这场谋杀复仇。所以，我的兄弟们，你们都要保持坚强，继续前进。要知道我爱你们所有人。我爱人民，我爱你们所有人，为了你们的祝福、力量、勇气和尊严，以及你们今晚来到这里的方式，还有你们抗议和团结这个国家的方式。继续前进，我的兄弟们。奴隶制没能阻止我们。南方的私刑没能阻止我们。今晚这场私刑也阻止不了我们。我们将前进。我们在这个国家的命运是自由和解放。我们将通过任何必要的手段获得自由和解放。通过任何必要的手段，我们继续向前迈进。我爱你，杰克逊先生。比安卡，确保国家得不到我的尸体。确保我以沙卡·桑科法的名字被铭记。我的名字不是加里·格雷厄姆。确保它正确地刻在我的墓碑上：沙卡·桑科法。我为信仰而死。我为正义和正确之事而死。我没有杀害鲍比·兰伯特，真相会大白于天下。它会水落石出的。我希望你们把这件事提交到国际法庭，罗伯特·穆罕默德先生和所有其他人。我希望你们——我希望我的家人也参与——把这件事提交国际法庭并提出诉讼。获取所有关于殴打行为的录像带。他们在背后殴打我。他们在那边的牢房里殴打我。获取所有支持诉讼的录像带。让公众看到这场种族灭绝和残酷暴行，让世界看到紧闭的门后真正发生的一切。让世界看到这里正在发生的野蛮和不公。你们必须拿到那些录像带。你们必须将这种不公正暴露给全世界。你们必须继续要求暂停所有处决。我们必须前进，罗伯特·穆罕默德部长。阿散蒂·奇穆伦加，我爱你，因为你与我站在一起，我的姐妹。你是一位坚强的战士女王。你会在所做的一切中继续坚强。相信自己，你必须昂首挺胸，以温妮·曼德拉的精神，以纳尔逊·曼德拉的精神。你们必须前进。我们将阻止这场私刑。阿尔·夏普顿牧师，我爱你，我的兄弟。比安卡·贾格尔，我爱你们所有人。你们要确保我们继续团结在一起。杰西·杰克逊牧师，要知道这场谋杀、这场私刑不会被遗忘。我也爱你，我的兄弟。这是美国的种族灭绝。这就是黑人男子为正义和正确之事挺身而出抗议时会发生的事。我们拒绝妥协，我们拒绝为所知的正确之事放弃尊严。但我们会继续前进。我们过去一直坚强。作为一个民族，我们将继续坚强。你可以杀死一个革命者，但你不能阻止革命。革命将继续。人民将继续推动革命。你们就是必须继续推动革命的人民，以便将我们的孩子们从这场种族灭绝和今晚美国发生的一切中解放出来。这是过去一百年左右在美国发生的事。这是我们作为黑人在美国所忍受的种族灭绝的一部分。但我们终将克服，我们将继续下去。我们将继续，我们将通过任何必要的手段获得自由和解放。保持坚强。他们杀不了我们。我们将前进。对我的儿子们，对我的女儿们，对你们所有人。我爱你们所有人。你们一直都很棒。昂首挺胸。继续前进。保持团结。在社区中保持爱和团结。要知道胜利是确定的。人民的胜利是确定的。我们将在这个国家获得自由和解放。我们将获得它，我们将通过任何必要的手段做到。我们将继续前进。前进吧，黑人同胞们。高昂你们的头。前进吧。所有领袖们。前进吧。把你们的信息传给人民。宣扬暂停所有处决。我们将阻止，我们将结束这个国家的死刑。我们将结束全世界的死刑。向前推进吧，人民。要知道你们所做的是对的。你们所做的是正义的。这纯粹只是谋杀。这就是今晚在美国发生的一切。只不过是州政府授权的谋杀，州政府授权的私刑，就在美国这里，就在今晚。这就是正在发生的事，我的兄弟们。没有别的。他们知道我是无辜的。他们有事实来证明。他们知道我是无辜的。但他们不能承认我的清白，因为这样做就等于公开承认他们的罪行。这些种族主义者永远不会这样做。我们必须记住，兄弟们，这就是我们面临的情况。你们必须将这项事业向前推进。你们必须保持坚强。你们必须继续昂首挺胸，坚守在那里。我也爱你，我的兄弟。所有与我团结一致站在一起的人们。我们会胜利的。我们将继续前进。继续前进，黑人同胞们，黑人的力量。继续前进，黑人同胞们，黑人的力量。继续前进，黑人同胞们。继续前进，黑人同胞们。他们今晚在杀我。他们今晚在谋杀我。","tags":["39岁","哈里斯"]},{"name":"Paul Nuncio","text":"口述：我为新闻界准备了一份书面声明。一旦可能，就会发布。我还回应了法里斯女士的女儿桑迪对我的评论。我对死者深感遗憾。但我很抱歉，我不是那个凶手或与此有关的人。她有机会时会告诉你的。时机到了我会说的。我只希望你们每个人在轮到自己的时候都能保持耐心。我不会给任何人施加压力或让他们感到内疚。我只想说两件事：处决一个无辜的人——即使我是无辜的——那个负担会被消除，你们会安心，因为我知道这是怎么回事，而且当他们的时机到来时他们会付出代价。我现在要说的就是，我对发生的事感到遗憾，我对此负有部分责任——不是参与其中，而是没能及时恰当地传播信息，以找到真正的受害者或真正的罪犯或真正的凶手。我只想为这个家庭祈祷，祈求他们在这件事上能现身并给予宽恕。我们在天之父，愿你的名被尊为圣。愿你的国降临，愿你的旨意行在地上，如同行在天上。今天赐给我们日用的饮食，免我们的债，如同我们免了人的债。不叫我们遇见试探，救我们脱离凶恶。我们的主，阿门。还有，如果你的母亲成为上帝的帮手，握住我的手说‘你现在与上帝同在永生中了’，不要惊讶。这是她被选为证明我清白的见证之一。这就是我告诉你们我不想再给你们增加伤痛的意思。当你的时机到来时，她会让你知道我是无辜还是有罪。我要说的就是这些。爱你们所有人。","tags":["32岁","黑尔"]},{"name":"John Burks","text":"嘿，你们好吗？好了，会没事的。有些人我还没机会探望，嗯，我第一次开车到这里时遇到的……莱斯特·拜尔斯、克里斯·布莱克、阿尔巴、约翰·阿尔巴，还有罗萨莱斯·洛克。你们都知道自己是谁。突袭者队一定会赢的，你们（嘟囔着……莫比）。为我祈祷吧。会没事的。就这样，是时候离开了。事情要结束了，让我们了结吧。就这样。","tags":["44岁","麦克伦南"]},{"name":"Thomas Mason","text":"我知道迈克尔·斯凯恩斯应该在这里的某个地方。他们什么都做了，就是没能确保我得到公平审判来证明我的清白。我并不是那个把枪交给警察的人，而所有这些来自地区检察官办公室和总检察长办公室的篡改记录，这就是为什么迈克尔·斯普特尼克在我提出上诉后被解雇并逃跑了。我的那些出卖我的律师没有一个会使用这些证据，因为他们都跟法院串通一气。毫无疑问。杰克·金竭尽全力阻止我使用这些证据。他们等到听证会结束，然后在法庭上或书面文件中提出论点，没有人能反驳或否定证词和论点。有超过30份被篡改和伪造的记录，说我告诉某某某这个或那个，但你去查他们的记录，根本没说托马斯·梅森给他们打过电话或说过任何事。但没关系。所有这些证据都会被保留，所以杰克·金想怎么笑就怎么笑，好像他是大英雄一样。等这一切结束后，没关系。但那个持枪的人，他们知道不是托马斯·梅森，所以最后笑到最后的是谁？是那个跑掉的人。但杰克·金知道他利用所有这些伪造篡改的记录非法给我定罪。我姐姐有我律师提交但未向法院备案的文件。上面有签名。他把这些都放在一份记录里了。所以它会保留下来，不会因为我死了就被销毁。每个人迟早都要走，你们每个人迟早都会跟在我后面。我要说的就这些。","tags":["48岁","史密斯"]},{"name":"Robert Carter","text":"致戴维斯一家，我为给你们家庭带来的所有痛苦感到抱歉。是我一个人做的。安东尼·格雷夫斯与此事毫无关系。我在法庭上对他作了伪证。我的妻子也与此事无关。安东尼·格雷夫斯对此一无所知。我妻子也一无所知。但是，我希望你们能在基督耶稣里找到内心的平静、安慰和力量。就像我说的，我为伤害了你们的家庭而感到抱歉。事情发展到这一步真是一种耻辱。所以，我希望你们不要在我的死亡中找到平静，而是在基督里找到。因为只有他才能给予你们所需的力量。致我的家人，我爱你们。你们一直是我的福气，我爱你们所有人。有一天我会再见到你们的，所以希望你们在基督耶稣里找到平静、安慰和力量，因为那才是真正的归宿。阿布尔，看你的儿子；安妮特拉，看你的母亲。我爱你们。我准备好回家了，回到我的主身边。","tags":["34岁","巴斯特罗普县"]},{"name":"James Clayton","text":"我想借此机会，将这一刻作为基督的榜样。我想效仿他的榜样，心中怀着平安和宽恕离开。对于整个情况，我心里没有愤怒。我只想向你们所有人证明，我爱你们。我感谢你们的关心和对我真诚的爱。上帝保佑你们。我爱所有人。耶稣是主。","tags":["33岁","泰勒"]},{"name":"Richard Foster","text":"我已经与基督同钉十字架。现在活着的，不再是我，而是基督在我里面活着。所以，我如今在肉身活着，是因信神的儿子而活，他是爱我，为我舍己。我爱你，安妮。你是我在世界上有过的最好的朋友。我们在那里见，好吗？我准备好了，典狱长。","tags":["47岁","帕克县"]},{"name":"Ronald Allridge","text":"无","tags":["35岁","塔兰特"]},{"name":"James Richardson","text":"他们能做到回应吗？我说我祈祷，我接受。和我一起祈祷。这仍是一个声明。准备好了吗？亲爱的天父，请宽恕我们，主啊。我请求您守护我的妈妈和我的妹妹。我以基督之名请求。我也悔改我所有的罪，主啊。我祈祷您今晚带我回家。请让我安息在您的怀中，我以基督耶稣之名如此祈祷。我真心相信耶稣为我的罪而死，使我得以复活，主啊，您会成就这件事。请别让我失望，让我今天与您同在乐园。我以基督耶稣之名如此祈祷。唐娜和其他人，约翰逊先生，我请求你们为我祈祷，愿上帝今晚带我回家，使我留在乐园里，让我永远在那里。主啊，请不要让我去地狱。我承认我的罪。这是您的儿子，主耶稣，这是您的仆人，请收下，这是您的奴隶。我也爱你们。唐娜、妈妈和约翰逊先生，我留了一段话。不要放弃，我爱你们所有人，甚至包括我的敌人。我以基督耶稣之名真心宽恕你们，我们祈祷。我请求上帝从我心中和灵魂中带走一切仇恨。求您了，主啊，别让我失望。玛吉现在在这里吗？如果她在，我请求她的宽恕。我请求从今往后，您不要记恨我或我的家人，也不要有任何仇恨。我不知道。我听不到你的声音，你可能原谅我，也可能不。原谅迈克·艾利森，原谅麦克亨利，原谅我们所有人。无论代价如何，我爱你们。照顾好我的妈妈。唐娜，我也请你照顾好我的妈妈。每次你生她的气时，就想起我。想起我可能会回来。妈妈，我会努力兑现对你的承诺。我请求上帝允许祂的孩子回来看你。因为我在乐园里。有时我可以来（听不清）。好了，约翰逊先生，你多保重，愿我妈妈的意愿得以实现。再做一次祈祷，然后我们继续。天父，我承认我的罪，我真的悔改。让我知道我今晚会去乐园。请让我知道。我不想与撒旦或任何人一起下地狱。请告诉我这一点。我请求耶稣帮助我。以耶稣宝贵的名，我如此祈祷。我请求您赐予我这些应许，让我确信这些应许是真实的。我的祈祷是正确的。以耶稣宝贵的名，我如此祈祷。再见，妈妈。再见，唐娜。","tags":["32岁","纳瓦罗"]},{"name":"Michael McBride","text":"书面陈述：以下是迈克尔·L·麦克布莱德的个人最后声明。八福：耶稣举目看着门徒，说：“你们贫穷的人有福了，因为神的国是你们的。你们现在饥饿的人有福了，因为你们将要饱足。你们现在哀哭的人有福了，因为你们将要欢笑。人为人子恨恶你们，拒绝你们，辱骂你们，弃掉你们的名如同恶物，你们就有福了。当那日，你们要欢喜跳跃，因为你们在天上的赏赐是大的；他们的祖宗待先知也是这样。但你们富足的人有祸了，因为你们受过你们的安慰。你们饱足的人有祸了，因为你们将要饥饿。你们现在喜笑的人有祸了，因为你们将要哀恸哭泣。人都说你们好的时候，你们就有祸了，因为他们的祖宗待假先知也是这样。爱的超越超乎恩赐：《哥林多前书》第13章4-8节：爱是恒久忍耐，又有恩慈；爱是不嫉妒，爱是不自夸，不张狂，不作害羞的事，不求自己的益处，不轻易发怒，不计算人的恶，不喜欢不义，只喜欢真理；凡事包容，凡事相信，凡事盼望，凡事忍耐。爱是永不止息。先知讲道之能终必归于无有；说方言之能终必停止；知识也终必归于无有。如今常存的有信，有望，有爱这三样，其中最大的是爱。诗歌：不要在我的墓前哭泣，我不在那里，我没有长眠。我是雪中闪耀的钻石，我是成熟谷物上的阳光。我是轻柔的秋雨。当你从清晨的静谧中醒来，我是盘旋的鸟儿迅疾的振翅，我是夜晚闪耀的柔和星光。不要在我的墓前哭泣，我不在那里，我没有死去。签名：迈克尔·L·麦克布莱德 #903 2000年5月11日 德克萨斯州亨茨维尔","tags":["38岁","拉伯克"]},{"name":"William Kitchens","text":"是的，先生。詹姆斯·韦伯，我不知道你们是哪一位。我不记得审判时的情形了。我个人只想让你知道，如果你心中对发生的事情有任何疑问，我想让你知道，帕蒂对你始终忠诚，是我强迫她做了所有那些事，我很抱歉。我只是不知道该如何告诉你们，我对自己所做的事感到抱歉。我无法表达我的歉意。我只希望你们能以某种方式继续前行，并在生活中找到平静。主已赐予我平安，我祈祷的也是你们能找到那份平安。我只想让你知道，我为自己所做的事感到抱歉。我无法改变过去，我能做的只有说声抱歉，这相对于我所做的一切而言微不足道。我无法弥补你的损失。对不起。我只想让你们知道，我爱你们所有人。认识你们很愉快，请你们继续生活，一切都会好起来的。主会与我们同在。如果可以，我想先做个祷告。天父上帝，我感谢你赐予我在世上的时光，感谢你对我这样的罪人施以怜悯，我一生犯下许多可憎之事，天父，但你依旧用你的爱和怜悯触及我的心，在一切为时未晚之前改变了我。我祈求你将平安赐予帕特里夏·韦伯的家人，让他们知道，天父，你就在他们能找到平安的地方，你会帮助他们继续生活，天父。帮助他们，天父，让他们在心中找到宽恕，不是为了我，而是为了你和他们自己，天父，让他们在心中找到力量来宽恕我所做的一切。天父，我祈求你与我的家人同在，安慰他们，让他们继续前行，天父。天父，我们今天都因我所犯的错误而聚集于此，我感谢你的怜悯，差遣你的独生子来到世间，使我们得以认识你，天父。天父，我为这些狱警、官员和处理此事的人们祷告，天父，我祈求你触动他们的心，天父，如果其中有任何不公，求你宽恕他们，天父。让他们知道你的爱，天父，并知道你就是道路。我感谢你，奉耶稣的名祷告，阿门。我爱你们，你们保重。我真的很抱歉。","tags":["37岁","泰勒"]},{"name":"Tommy Jackson","text":"是的，先生。我想对罗宾逊一家说几句话。此刻我无论说什么或做什么可能都无济于事。你们现在大概都很恨我，如果我认为有人杀害了我的家人，我可能也会和你们一样。如果我知道是谁杀害了罗莎琳，我会告诉你们，但我要说的是：我将以上帝为证进入天堂。罗斯是我的私人朋友。她是个美丽的人，很有教养。我与罗宾逊一家关系很密切。她为自己有一位医生父亲感到自豪。我的家人不在场，这是我个人的意愿。现在局面反转了。你们都在这里，罗宾逊一家来看着我被处决。这是我不希望我的家人看到的。我绝不想看到罗莎琳死去。事发后我离开了现场。我向你们保证，如果当时我在场，你们就不会站在现在这个地方了。你们脸上的表情都非常严肃，而且即将发生非常严重的事情。我要为自己说几句，但我也知道这可能无济于事。但你们即将目睹的绝非好事。这很不愉快。媒体。请允许我向媒体说几句话。在我走之前，我想说，有人说我没有表现出悔意，但如果你们查看我的记录和背景，问任何认识我的人，要我对从未做过的杀戮表现出悔意，这一次我做不到。如果我表现出悔意，那将是虚伪的。我这个人绝不虚伪。绝不虚伪。我当然做过错事，也为此服了刑。但这一次，我无法对我没做过的事表现出悔意。我很平静，请相信我。因此，我认为我现在为之而死的是我过去的所作所为。这就是我为之而死的事情。而不是因为杀害了罗莎琳。我不知道你们怎么称呼她，我叫她罗斯，就叫她罗斯。就这样。","tags":["43岁","威廉森县"]},{"name":"Timothy Gribble","text":"口头陈述：好的，谢谢。致韦斯一家，我想从心底告诉你们，我真的很抱歉。我是认真的，不只是说说而已。在监狱的这些年里，我学会珍惜和尊重生命。我做的事是错的。我知道你们经历了很多痛苦，我很抱歉。致琼斯一家，同样，我真的非常抱歉。我本想准备更长的声明，但时间不够了。我让牧师为我的朋友们和你们，我的家人，写下几句话。我想请他替我读出来，请你们找到内心的平静。","tags":["36岁","加尔维斯顿"]},{"name":"Ponchai Wilkerson","text":"无","tags":["28岁","哈里斯"]},{"name":"Freddie Webb","text":"平安。","tags":["33岁","纽埃西斯"]},{"name":"Odell Barnes, Jr.","text":"我想向我的所有家人、支持者和律师们献上最深厚的爱。他们在这场经历中一直支持着我。感谢你们证明我的清白，尽管法院尚未承认这一点。愿你们继续奋斗，愿你们改变今天和过去发生的一切。生活对我并不算好，但我相信，在遇到这么多支持我的人之后，一切终将结束，愿这成为未来更公正判决的果实。我要说的就这些。","tags":["31岁","拉伯克"]},{"name":"Betty Beets","text":"无","tags":["62岁","亨德森县"]},{"name":"Cornelius Goss","text":"我想向受害者的家人道歉。呃，不，我真的说不出什么，我觉得我说什么也无济于事，但我希望通过你们的上帝，你们能原谅我。我绝对不再是过去的那个我。我曾经病态、恐惧，并以错误的方式寻求爱。我给你们带来了难以想象的痛苦和悲伤。我希望你们能原谅我。致我的母亲，我非常爱你。谢谢，琼斯。","tags":["38岁","达拉斯"]},{"name":"James Moreland","text":"爸爸，我爱你们俩。你们一直是最好的。你们所有人，真的都是最好的。呃，我想我要回家了。对不起，我是真心的，不仅仅是说说而已。我能付出的只有生命。我夺走了两条生命，我知道它们对你们无比珍贵。这就是我一生的写照，这就是酒精对人的影响。哦，耶稣，主啊，带我回家。亲爱的主。带我回家吧，主。带我回家。是的，先生。带我回家吧，主。","tags":["39岁","亨德森县"]},{"name":"Glen McGinnis","text":"无","tags":["27岁","蒙哥马利"]},{"name":"David Long","text":"啊，只是，啊，对不起大家。我想我试过所有能联系到你们的方式，来表达我有多么抱歉。那次事件发生后，我一直不对头。我给某个人寄过一封信，你知道，一封信简述了我对一切的感受。但不管怎样，我只想，在那之后立刻向你们道歉。我对此真的非常抱歉。我是在加州青少年管理局长大的。我无法确切指出这一切是从哪里开始的，发生了什么事，但我真的相信，说到底，发生在我身上的事是在加利福尼亚。我曾待过他们的教养所和监狱，但啊，他们在那里制造了怪物。就是这样，我没别的话说了。谢谢你来，杰克。","tags":["46岁","达拉斯"]},{"name":"Billy Hughes, Jr.","text":"是的，我心甘情愿。我想告诉你们我有多爱你们所有人，我有多感激这一切。我爱你们和我的家人。我珍惜我所拥有的每一个瞬间。我想让兄弟们知道，不要放弃，不要屈服，我希望有一天这个系统的疯狂会有所改变，会有解决的办法。如果可以换回马克·弗雷德里克斯的生命，我宁愿放弃过去24年。还给他生命，让我父亲恢复生命，让我母亲恢复健康。我所求的只是拥有一天的时光和所有关于你们以及我家人的回忆，以及发生的一切事情。他们在处决一个无辜的人，因为事情并不像他们说的那样发生。真相总有一天会大白。我和24年前的自己完全不同。谁会想到需要24年才能走到这一刻？不要放弃，不要屈服。如果我在偿还社会债务，那该给我退款和补偿，但我爱你们所有人，你们要照顾好妈妈，继续前进。谢谢，典狱长。","tags":["47岁","马塔戈达"]},{"name":"Larry Robison","text":"无","tags":["42岁","塔兰特"]},{"name":"David Hicks","text":"嘿，外面的你们还好吗？我嗓子都哑了。你们要坚强，好吗？唐，谢了老兄。我爱你，格洛丽亚，永远爱你宝贝。我要说的就这些。嘿，别为我担心，好吗？","tags":["38岁","弗里斯特"]},{"name":"Spencer Goodman","text":"向我的家人，我爱他们。向卡米，我爱你，会一直与你同在。就这些了典狱长。","tags":["31岁","本德堡"]},{"name":"Earl Heiselbetz, Jr.","text":"爱你们，来世再见。","tags":["48岁","萨宾"]},{"name":"Sammie Felder, Jr.","text":"想告诉我的朋友们我爱他们。感谢他们在这里支持我。艾莉森，我爱你。","tags":["54岁","哈里斯"]},{"name":"Robert Atworth","text":"嗯，首先，我的人们，你们已经听到了我今天需要说的所有话。我希望我说对了。希望你们听到了。也希望你们走出去之后，做你们需要做的事，做正确的事。团结就是力量。互相照应。你们还有机会在肖恩身上。埃德温，你知道该怎么做。你有我的爱。这是正确的事。至于其他所有人，那些心怀恶意，让野心凌驾于所知之上的人。请做正确的事。尽管他们只是必须做好本职工作。对于那些血管里流淌着仇恨，并以此为耻的人。你们什么都没做。是我做的，是我选择了这条路，你们什么都没做。记住这一点，如果你们只知道仇恨，只知道血亲之爱，你们永远不会满足。对于外面所有那样的人，只知道消极，亲亲我骄傲的白人爱尔兰屁股吧。我准备好了，典狱长，送我回家。","tags":["30岁","达拉斯"]},{"name":"James Beathard","text":"我想首先感谢我的家庭给予我的爱。世界上没有人比我拥有更好的家庭。我有世上最好的父母，最好的兄弟姐妹。我度过了任何人所能拥有的最美好的人生。我从未像以我的女儿和儿子为荣这样为任何人感到骄傲。对此我没有怨言，也毫无遗憾。我爱他们每一个人，并且一生都一直被爱着。对此我从未有过任何怀疑。既然这是人们为数不多愿意听我说话的场合，我想谈几件事。美国现在到了对人类生命毫无尊重的地步。我的死亡只是更大病症的一个症状。政府迟早要醒悟，停止破坏其他国家、杀害无辜儿童的行为。目前对伊朗、伊拉克、古巴等地持续的禁运和制裁，并没有改变世界，反而伤害了无辜儿童。这种做法必须停止。或许从很多方面来看，更严重的是我们对环境造成的破坏，因为只要我们继续沿着现在的方向走，最终结果就是：我们如何对待其他人将不再重要，因为地球上的每个人都将走向消亡。我们必须醒悟，停止这样做。啊，在世界上，真相能得以传播、人们能了解正在发生之事的少数途径之一，便是我们支持新闻自由。我看到新闻业作为自由机构正在挣扎求生。德克萨斯州少数真正自由的机构之一就是新闻界。像《德克萨斯观察家》这样的媒体，我想感谢他们所做的工作，让我和所有人都能了解情况。我希望大家能支持他们、倾听他们、为他们发声。没有他们，类似的事情会发生，而无人知晓。我爱你们所有人。我一直爱着，并将永远爱着。我想对德克萨斯州，特别是将我送进这里的地区检察官乔·普莱斯说几句话。我想提醒普莱斯先生，他在吉恩·霍桑的审判中犯了一个错误，当时他说吉恩·霍桑在我的审判中说了实话。普莱斯先生是一只有一只眼的猎犬。实际上他并非独眼猎犬，而事实上吉恩·霍桑在我的审判中撒了谎。所有人都知道。我今晚将基于证词而死去，而这些证词——我、作证的人、以及他利用的检察官——都知道那是谎言。我希望有人能因为他最近在报纸上的言论而向他问责。检察官捏造、歪曲真相、试图重新篡改事实已经很糟了。但当他们真的编造事实并当作审判证据呈现给公众时，这就超越了失职，完全不可原谅。我希望有人能让普莱斯先生对他所说的、将我送进这里的网球鞋做出解释或说明。我对此仍然完全不解，希望有人能回去核实审判记录，让他为自己向公众和媒体撒谎负责。我要说的就是这些，除了我爱我的家人。没有人，没有人拥有比我家更好的家庭了。我爱你，小宝贝。我也爱你，小虫子。永远不要让他们忘记我。我永远不会忘记他们。我们另一边见，好吗。再见，黛比。再见，兄弟。再见，小宝贝。迈克神父，沃尔什神父，我爱你们。就这些了，先生。","tags":["42岁","特里尼蒂"]},{"name":"Curtis Johnson","text":"无","tags":["38岁","哈里斯"]},{"name":"Domingo Cantu, Jr.","text":"英语：我爱你。我会在另一边等你。儿子，无论发生什么都要坚强，要知道上帝在看着你。耶稣慈悲，耶稣慈悲，耶稣慈悲！西班牙语：妹夫，照顾好家人，让他们团结。尤利。德语：Menic schone prizessin。Du list all mine herz and seele，rind ich liele dich so sehm！（翻译：我美丽的公主。你是我全部的心和灵魂，我非常爱你。）","tags":["31岁","达拉斯"]},{"name":"Jerry McFadden","text":"无","tags":["51岁","厄普舒尔"]},{"name":"Alvin Crane","text":"我想说几句话。我只想对家人说声对不起。我知道我给你带来了很多痛苦和折磨，我希望你能从中找到一些平静和安慰。如果可以，请放下所有的愤怒。别让它隔断你和上帝。抱歉今晚给大家添了这么多麻烦，布鲁斯、乔，你们都对我很尊重，我很感激。真的。我只想告诉我的家人，所有我爱的人，我想让你们知道我爱你们，而且上帝也爱你们。一切都会好起来的，都会好起来的。我爱你们。就这些。","tags":["41岁","丹顿"]},{"name":"Richard Smith","text":"无","tags":["43岁","哈里斯"]},{"name":"William Davis","text":"我要感谢全能的上帝，藉着他的恩典，通过他的儿子耶稣基督我得以得救，没有他，我今天什么都不是。因着这份怜悯和恩典，我走了很长的路，我要感谢上帝以及所有帮助过我的人。我想对朗一家说，从我的灵魂和内心深处，我为我行为造成的痛苦和折磨感到无比抱歉。我真的很抱歉。对我的家人，我也要同样为给他们带来的痛苦和折磨道歉，我深爱着他们，发自心底地爱着他们，希望有一天能在彼岸与他们相见。有些人我能见到，有些人我不能。我要感谢死囚区所有这些年，特别是过去两三个星期里，给予我关爱的人，我对任何人都没有怨恨。我非常感激自己能活这么久。我希望我曾帮助过某人。我希望通过将我的遗体捐献给科学，部分器官能用于帮助他人。我只感谢主为我所做的一切。我要说的就这些，监狱长。哦，最后我想说：“那些牛仔怎么样？”","tags":["42岁","哈里斯"]},{"name":"Willis Barnes","text":"是的，我想向我的母亲、姐妹和兄弟表达爱，让他们知道我现在想念着他们，我要感谢上帝赐予我如此充满爱的家庭。对受害者的家人：我希望你们能发自内心地原谅我，如同我已经原谅了你们。我准备好了，监狱长。","tags":["51岁","哈里斯"]},{"name":"Raymond Jones","text":"无","tags":["39岁","杰斐逊"]},{"name":"Joe Trevino, Jr.","text":"无","tags":["37岁","塔兰特"]},{"name":"Tyrone Fuller","text":"是的，对我的家人，我爱你们。请不要为我的死亡或生命哀悼。继续按照我希望你们的方式生活。我对任何人都没有怨恨。只需记住那道光。我要让这道光照耀。让它闪耀。让光芒闪耀。","tags":["35岁","格雷森"]},{"name":"Charles Tuttle","text":"对凯西那些今天未能到场的家人和朋友，我深感抱歉。我希望我放弃上诉在某种程度上已经开始抚平你们的伤痛。为我对你们造成的噩梦和痛苦，这是我唯一能帮助你们的方式，但我真的很抱歉，我希望我能收回我所做的一切，但我不能。我希望这能治愈你们。","tags":["35岁","史密斯"]},{"name":"Joseph Faulder","text":"无","tags":["61岁","Gr鸡蛋"]},{"name":"William Little","text":"无","tags":["38岁","利伯蒂"]},{"name":"Clydell Coleman","text":"无","tags":["62岁","麦克伦南"]},{"name":"Jose De La Cruz","text":"无","tags":["31岁","纽埃西斯"]},{"name":"Aaron Foust","text":"再见了，朋友们，我们彼岸相见。你们准备好了，我就准备好了。","tags":["26岁","塔兰特"]},{"name":"Excell White","text":"无","tags":["61岁","科林"]},{"name":"Charles Rector","text":"我想做的第一份声明是关于我姐姐的。我想让她知道，这里说的每一句话、做的每一个动作、每一个举动，我都真心诚意地牢记在心，铭记于灵魂之中。","tags":["44岁","特拉维斯县"]},{"name":"Norman Green","text":"无","tags":["38岁","贝萨尔"]},{"name":"Andrew Cantu","text":"无","tags":["30岁","泰勒"]},{"name":"Robert Black, Jr.","text":"《高飞》（航空诗）","tags":["45岁","布拉索斯"]},{"name":"Danny Barber","text":"你好，英格拉姆女士，很高兴见到你。我说过我可以说话，但我想我说不出口。我听说你有个侄女说了一些愤怒的话。暂缓执行与我无关。我花了过去二十年等着弄清楚发生了什么。我祈祷你能放下这件事，这是我现在唯一能想到要说的话。我对自己所做的事感到后悔，但我早已不是那时的我了。如果你能了解这些年来的我，你就能看到这一点。我这里有一些人相信这一点。","tags":["43岁","达拉斯"]},{"name":"George Cordova","text":"对于我给你们造成的痛苦，我甚至羞于看你们的脸。你们都是好人。致死囚区的兄弟们。墨西哥，墨西哥…… （西班牙语）","tags":["39岁","贝萨尔"]},{"name":"Martin Vega","text":"我真的没什么好说的。我只想说，当州政府让我姐姐和侄女作为州证人出庭时，并不是她们指证我。问题是，我的律师没有传唤任何人，所以他们允许州政府传唤她们，向陪审团描绘成一幅我亲姐姐和侄女在指证我的画面。","tags":["52岁","考德威尔"]},{"name":"Troy Farris","text":"首先，致罗森鲍姆一家，致辛迪，致斯科特，致所有人，我只想说我对你们只有爱。我是发自内心最深处的。","tags":["36岁","塔兰特"]},{"name":"John Moody","text":"我想为给你们所有人（包括我的家人）造成的所有痛苦和折磨道歉并请求原谅。所有人，我非常抱歉。一个人在审判中会有求死之心。尽管我的审判是仁慈的，但我希望并祈祷所有涉事者以及降临在你们身上的审判，有一天会比我的审判更加仁慈。愿上帝保佑你们。愿上帝指引。我爱你们。请保持坚强。请求上帝的怜悯。我也爱你们所有人。我非常抱歉。我得走了。我爱你们。","tags":["46岁","泰勒"]},{"name":"James Meanes","text":"就像大海永远回归自身，爱也永远回归自身。意识也是如此，永远回归自身。我带着唇边的爱这样做。愿上帝保佑全人类。","tags":["42岁","哈里斯"]},{"name":"Jeff Emery","text":"我只想告诉凯瑟琳娜我爱你。请照顾好自己。我要说的就这些。","tags":["49岁","布拉索斯"]},{"name":"Daniel Corwin","text":"我想首先感谢两位非常特别的人，莎拉和萨布丽娜。感谢你们给予我的机会。这对我的人生产生了非常重要的影响。我感谢你们。再次从心底感谢你们。对不起。我最想对你说的话是对你和你的家人说的，我知道我没有机会以任何形式、方式或方法和你交流。我对我所做的事情感到后悔，我想让你知道我对此很抱歉。我只请求并希望将来的某一天你能原谅我。我认为在很多方面，没有原谅，生活会变得非常空虚和空洞，我们只剩下仇恨和愤怒。我想关于死刑我唯一想说的是，很多时候人们认为这是单方面的，但事实并非如此。这是双方面的。双方都有痛苦，这不是人们坐在那里轻易下结论说这是好事或坏事的问题。但这是需要每个人心中去审视和渴望的事情。我只希望你们所有人能够理解这一点，并在将来的某一天原谅我。我要感谢你们给我这个机会和你们交谈和见面。这对我来说意义重大。非常感谢你们陪伴我和我的家人。谢谢你们。我爱你们。","tags":["40岁","蒙哥马利"]},{"name":"Kenneth McDuff","text":"我准备好被释放了。释放我吧。","tags":["52岁","哈里斯"]},{"name":"Jonathan Nobles","text":"哥林多前书12:31B – 13:13 (新国际版)","tags":["37岁","特拉维斯县"]},{"name":"Javier Cruz","text":"谢谢你让我获得自由。愿上帝保佑你们所有人。我爱你，米格尔。请照顾好我的天使，莱斯利。爱你的，哈维尔·克鲁兹","tags":["41岁","贝萨尔"]},{"name":"David Castillo","text":"长话短说。只想说，呃，家人们，照顾好自己。呃，把这看作一次学习的经历。万事皆有因。我们都知道真正发生了什么，但有些事情你无法抗争。小人物似乎总是被碾压。这很常见。即便如此，也得坦然接受好坏。没有人能完全脱离邪恶，也没有人邪恶到一无是处。但这就是生活的一部分，我的家人们，照顾好自己。告诉我妻子我爱她。我会照看所有人，尤其是我的侄子和侄女们。我很好。我爱你们。保重。我准备好了。","tags":["43岁","伊达尔戈"]},{"name":"Delbert Teague, Jr.","text":"我今天来这里是为了赴死，不是为了发表演讲。今天是个赴死的好日子。","tags":["35岁","塔兰特"]},{"name":"Genaro Camacho, Jr.","text":"我爱你们所有人。我们举行了一场不错的仪式，我会和你们在一起。我会在天堂等你们。好了。再见。我要说的就这些。","tags":["43岁","达拉斯"]},{"name":"Leopoldo Narvaiz","text":"无","tags":["30岁","贝萨尔"]},{"name":"Johnny Pyles","text":"我想告诉你们在场的人们，我心里对你们充满爱。我希望你们不要在我的处决中寻求满足、安慰或平静。耶稣基督是我的主和救主，我希望他也能成为你们的主和救主。我对给你们家庭带来的痛苦和心碎感到抱歉。多年来，我给自己的家庭带来了太多的问题和心碎。我很抱歉。我想让你们知道，主耶稣是我生命的意义，我只想走了。我即将入睡，很快我就能在他身边了。我有理由欢欣鼓舞，我祈祷将来有一天能在那里见到你们所有人。","tags":["40岁","达拉斯"]},{"name":"Clifford Boggess","text":"我想对雷·黑泽尔伍德和弗兰克·科利尔的谋杀案说，我对由此给你们带来的痛苦感到抱歉。对我的朋友们，我想说我爱你们，我很高兴你们曾是我生命的一部分。谢谢你们。我会想念你们。请记住，今天我将与耶稣一起置身天堂。我会再见到你们的。","tags":["32岁","克莱县"]},{"name":"Pedro Muniz","text":"我知道你现在听不到我说话，但我知道无论我说什么都无关紧要了。","tags":["41岁","威廉森县"]},{"name":"Robert Carter","text":"我爱你们所有人。感谢你们如此关心我。坚守信念。我即将去一个更好的地方。希望受害者家属能原谅我，因为我无意伤害或杀害任何人。","tags":["34岁","哈里斯"]},{"name":"Frank McFarland","text":"对于我没有犯下的罪行，我无需道歉。那些对我撒谎并伪造证据的人，必将为他们所做的事负责。我心里清楚我做了什么，我呼唤我祖先和族人的灵魂，我向他们发誓，现在我回家了。","tags":["34岁","塔兰特"]},{"name":"Lesley Gosch","text":"无","tags":["42岁","维多利亚县"]},{"name":"Joseph Cannon","text":"我对你母亲所做的一切感到抱歉。这并非因为我要死了。我一生都被禁锢着。我永远无法原谅自己所做的一切。我对你们所有人都感到抱歉。我爱你们所有人。感谢你们支持我。感谢你们在我小时候善待我。感谢你，上帝。","tags":["38岁","贝萨尔"]},{"name":"Jerry Hogue","text":"明迪，我与你同在，亲爱的。我不知道为什么，明迪，你要这样做，但我仍然会原谅你。你知道他是个杀人犯。你为什么不支持我？他会再次行凶的。明迪，你还活着是幸运的。","tags":["47岁","塔兰特"]},{"name":"Steven Renfro","text":"我想对受害者家属说，我很抱歉，非常抱歉。","tags":["40岁","哈里森县"]},{"name":"Michael Lockhart","text":"很多人把这里发生的事情视为邪恶，但我想让你们知道，我在这里找到了爱和同情。我感谢这里的工作人员对我的善意，我深深地感激这里的工作人员为我所做的一切。就这些了，监狱长，我准备好了。","tags":["37岁","贝萨尔"]},{"name":"Charlie Livingston","text":"你们把我带到这里是为了处决，不是让我发表演讲。就这些。","tags":["35岁","哈里斯"]},{"name":"Michael Sharp","text":"是的，我想说的是。我想对在场的受害者幸存者、社会、我的家人和朋友说，我请求他们原谅我做过的一切。我恳求你们的原谅。我想请求主耶稣基督的宽恕，并想说，尽管身处这样的境况，我仍得到了他的祝福。我首先想到的是耶稣基督降临，将人类与上帝隔开。我希望今晚能打破将我们这些群体隔开的壁垒，让我们彼此充满爱与同情，为我们所有人创造一个未来。死囚区还有很多需要被记住的人。我爱所有人……","tags":["43岁","克罗基特县"]},{"name":"Aaron Fuller","text":"耶稣，主，是我的一切。没有他，我什么都不是。赞美耶稣。赞美上帝。","tags":["30岁","道森县"]},{"name":"Aua Lauti","text":"我很高兴找到了上帝，我为此感到非常快乐。","tags":["43岁","哈里斯"]},{"name":"Kenneth Ransom","text":"首先，我想对受害者家属说，我虽然不觉得自己有罪，但我很抱歉。我为他们在节日和生日时因失去亲人而承受的痛苦道歉。","tags":["34岁","哈里斯"]},{"name":"Ricky Green","text":"我想感谢主给我这个机会去认识他。在过去的两个月里，他向我展示了很多，也改变了我。","tags":["36岁","塔兰特"]},{"name":"Earl Behringer","text":"今天是个好死的日子。我像条汉子走进来，也会像条汉子走出去。我此生不虚。我体会过一个好女人的爱，我的妻子。我有一个美满的家庭。我的祖母是社区的支柱。我珍爱我的亲友。谢谢你们的爱。","tags":["33岁","塔兰特"]},{"name":"Dwight Adanandus","text":"克拉夫特女士和贝瑟里女士，我不知道该对你们说什么，但我为多年来给你们和你们的家庭带来的痛苦道歉。我希望你们能接受我的道歉，并且知道这是真诚的。我希望这能让你们和你们的家庭继续前行，我希望你们能原谅我，也希望哈农先生[难以辨认]能原谅我夺走了他的生命。请接受我的道歉。我爱你们所有人。","tags":["41岁","贝萨尔"]},{"name":"John Cockrum","text":"我想为给你们带来的所有痛苦向受害者家属道歉。我想告诉我的家人我爱他们，希望很快能再见到他们。主耶稣，感谢你在我生命中赐予我力量和时机，让我找到耶稣基督，并让我所有的罪得到赦免。感谢你赐予我生命中的改变，家人的爱与亲近，以及我美丽的女儿。感谢你使用我——","tags":["38岁","鲍伊县"]},{"name":"Benjamin Stone","text":"无","tags":["45岁","纽埃西斯"]},{"name":"Jessel Turner","text":"首先，我想赞美上帝，感谢他的爱与恩典，使这一切得以聚在一起。","tags":["37岁","哈里斯"]},{"name":"James Davis","text":"好了，朋友们，在我心中，我已经准备好了——","tags":["34岁","特拉维斯县"]},{"name":"Robert West, Jr.","text":"我为我带给你们所有人的痛苦和折磨深表歉意。希望这能带给你们以及未来的你们一份释然。","tags":["35岁","哈里斯"]},{"name":"Irineo Montoya","text":"再见。","tags":["29岁","卡梅伦"]},{"name":"Eddie Johnson","text":"我想对马吉家族和卡德纳家族说，我曾是大卫和维吉尼亚的朋友，我没有犯下这起罪行。","tags":["44岁","阿兰瑟斯"]},{"name":"David Stoker","text":"我已准备好一份声明，交给了牧师，希望向媒体发布。","tags":["38岁","黑尔"]},{"name":"Patrick Rogers","text":"是的，我要赞美真主，我向真主祈祷。真主至仁至慈。我祈求真主宽恕，因为他创造了我，也必会宽恕我。","tags":["33岁","科林"]},{"name":"Robert Madden","text":"是的，长官，我有。好吧，我们就到这里。我为你们的损失和痛苦道歉，但我没有杀害那些人。","tags":["33岁","莱昂"]},{"name":"Larry White","text":"我为我给家人和所有朋友带来的伤害、痛苦和失望道歉。希望所有有毒品问题的退伍军人和青少年能寻求帮助。希望上帝宽恕我所有的罪。感谢杰克和凯西的陪伴。希望那些支持死刑犯的人们继续努力，也许我们能解决这个问题并废除死刑。希望我去的地方比这里好得多。","tags":["47岁","哈里斯"]},{"name":"Bruce Callins","text":"我想让我所有的亲友和所有在场支持我的人知道，我爱他们，祝他们一切顺利。","tags":["37岁","塔兰特"]},{"name":"Clarence Lackey","text":"感谢主耶稣基督这些年让我保持坚强。也感谢母亲这些年始终支持我。感谢我的笔友乔、卡米尔·蒂林和乔安这些年帮我保持坚强。也感谢我的两位律师丽塔和布伦特为保住我的生命而奋斗。我爱你，妈妈——","tags":["42岁","汤姆格林"]},{"name":"Richard Drinkard","text":"无","tags":["39岁","哈里斯"]},{"name":"Clifton Belyeu","text":"首先，我要感谢上帝、我的家人以及我的妻子诺拉，感谢他们一直以来对我的支持和鼓励。我爱你们！！现在，我要感谢今天来到这里的所有人。我知道你们大多数人是来看我受苦和死亡的，但你们会大失所望，因为今天是快乐的一天。今天，我将从这一切痛苦和磨难中解脱。今天，我要回家，去天堂，与我的天父耶稣基督永恒同在。当我躺在这里，呼吸最后一口气时，我会为你们所有人祈祷，因为你们今天带着愤怒和仇恨来到这里，让撒旦欺骗你们，让你们相信自己的所作所为是正确的、正义的。愿上帝帮助你们，因为你们今天在这里的所作所为以及你们心中的想法，使你们与这个国家所有死囚牢房里的男女毫无区别。今天，你们也在谋杀！！！我为自己祈祷，祈求宽恕我给你们带来的任何痛苦，我祈祷有一天你们能认识到自己的错误，并像我一样祈求上帝的宽恕，因为没有上帝的宽恕，就没有平安。","tags":["38岁","麦克伦南"]},{"name":"Anthony Westley","text":"我想让你们知道，我没有杀任何人。我爱你们大家。（罪犯的话不清晰）","tags":["36岁","哈里斯"]},{"name":"Terry Washington","text":"无","tags":["33岁","沃克"]},{"name":"Ernest Baldree","text":"无","tags":["55岁","纳瓦罗"]},{"name":"Benjamin Boyle","text":"无","tags":["53岁","波特"]},{"name":"Kenneth Gentry","text":"感谢上帝，过去十四年让我得以成长为一个真正的人。","tags":["36岁","丹顿"]},{"name":"Billy Woods","text":"无","tags":["50岁","哈里斯"]},{"name":"David Spence","text":"是的，我愿意。首先，我希望你们明白，我说的是实话：我没有杀害你们的孩子。老实说，我没有杀过任何人。我希望你们能放下心中的愤怒，看清真相，摒弃仇恨。","tags":["40岁","麦克伦南"]},{"name":"David Herman","text":"夺走你所爱之人的生命，并对那么多人造成身心伤害，是可怕且不可原谅的。我在这里是因为我夺走了一个生命，无论个人还是国家，杀戮都是错误的。我为此刻的境况感到抱歉，但如果我的死亡能带给你们平静和了结，那这一切就值得。致我所有的朋友和家人，我爱你们，我要回家了——","tags":["39岁","塔兰特"]},{"name":"John Barefield","text":"（含混不清地说。）告诉妈妈我爱她。","tags":["32岁","哈里斯"]},{"name":"Richard Brimage, Jr.","text":"不是我说的，而是上帝有话对你们说：拯救孩子们。找到一个需要帮助的人，牺牲自己的一点财富，去拯救那些无辜的生命。他们是让世界变得更好的关键。","tags":["42岁","克莱伯格"]},{"name":"Mikel Derrick","text":"我只希望所有我曾伤害过或做错事的人，能够原谅我对他们犯下的错。","tags":["33岁","哈里斯"]},{"name":"Joe Gonzales, Jr.","text":"世界上每天都有人面临比死亡更糟糕的事情，从这个意义上说，我认为自己很幸运。","tags":["36岁","波特"]},{"name":"Kenneth Granviel","text":"无","tags":["45岁","塔兰特"]},{"name":"Leo Jenkins","text":"无","tags":["38岁","哈里斯"]},{"name":"James Briddle","text":"无","tags":["40岁","哈里斯"]},{"name":"Esequel Banda","text":"无","tags":["31岁","汉密尔顿"]},{"name":"Hai Vuong","text":"我感谢上帝在十字架上为我的罪而死，我感谢他拯救了我的灵魂，所以我知道当我的肉体躺回坟墓时，我的灵魂将与主同在。赞美上帝。我希望今晚无论谁听到我的声音，都会转向主。我将我的灵魂交还给他。赞美主。赞美耶稣。哈利路亚。","tags":["40岁","杰斐逊"]},{"name":"Bernard Amos","text":"无","tags":["33岁","达拉斯"]},{"name":"Harold Lane","text":"无","tags":["50岁","达拉斯"]},{"name":"Carl Johnson","text":"我想让全世界知道，我是无辜的，而且我找到了平静。我们走吧。","tags":["40岁","哈里斯"]},{"name":"Vernon Sattiewhite","text":"我想说——我只希望菲尔德女士现在满意了。我要感谢我的律师南希，感谢她为我的案件提供的帮助以及此刻的陪伴。","tags":["40岁","贝萨尔"]},{"name":"Karl Hammond","text":"无","tags":["31岁","贝萨尔"]},{"name":"John Fearance","text":"我想说，我对任何人都没有敌意。十八年前我犯了一个错误——我一时失去了理智，但我无意伤害任何人。我对人性没有仇恨。我希望他能原谅我所做的一切。我不是故意的。","tags":["41岁","达拉斯"]},{"name":"Fletcher Mann","text":"我想告诉家人我爱他们。我的律师尽力了。所有在死囚区里的兄弟们，无论已经离世还是仍在坚守，请坚持下去。我要说的就这些。","tags":["34岁","达拉斯"]},{"name":"Noble Mays","text":"无","tags":["42岁","威尔巴格"]},{"name":"Samuel Hawkins","text":"无","tags":["52岁","拉伯克"]},{"name":"Billy Gardner","text":"我原谅你们所有人——希望上帝也原谅你们所有人。","tags":["52岁","达拉斯"]},{"name":"Jeffery Motley","text":"我爱你，妈妈。再见。","tags":["29岁","哈里斯"]},{"name":"Willie Williams","text":"伊斯兰教里有爱有和平。","tags":["38岁","哈里斯"]},{"name":"Clifton Russell, Jr.","text":"我要感谢我的朋友们和家人们，感谢你们在这所有事情中一直支持我。我想鼓励我的兄弟们继续奔跑。我感谢我的天父上帝，感谢祂赐予我的恩典——我已经准备好了。","tags":["38岁","泰勒"]},{"name":"Mario Marquez","text":"感谢你，主耶稣基督和救世主，我已准备好归家。阿门。","tags":["36岁","贝萨尔"]},{"name":"Jesse Jacobs","text":"我一生中犯下了许多罪，但我对这起罪行是无辜的。","tags":["44岁","沃克"]},{"name":"Raymond Kinnamon","text":"……像他们这样的人被牵连进这样的事。感谢泰勒牧师和简。我刚收到你的信。感谢卡洛琳和格洛丽亚，她们是我超过四年的朋友。我想记住帕齐·邦蒂恩、格拉迪斯和更多朋友。我要感谢我案件中的检察官；他做出那样的举动需要勇气，但他之所以那样做，是因为他相信司法体系。","tags":["53岁","哈里斯"]},{"name":"James Smith","text":"无","tags":["37岁","哈里斯"]},{"name":"Herman Clark, Jr.","text":"我告诉女儿不要来。请停止，请不要说话。具体来说，我想说，十三年前我来到死囚牢房时那个邪恶的坏蛋已经不在了——靠着上帝的力量；耶稣基督；全能的上帝；圣灵，祂将我转变成了基督里的新造之人。我知道我是基督的孩子，我的主会张开双臂欢迎我。","tags":["48岁","哈里斯"]},{"name":"Warren Bridge","text":"回头见。","tags":["34岁","加尔维斯顿"]},{"name":"Walter Williams","text":"（含糊地咕哝希望一生能信奉伊斯兰教）","tags":["32岁","贝萨尔"]},{"name":"George Lott","text":"无","tags":["47岁","波特"]},{"name":"Jessie Gutierrez","text":"我热爱每一个人，仅此而已。","tags":["29岁","布拉索斯"]},{"name":"Robert Drew","text":"（前两三个词听不清。）我不知道为什么玛塔·格拉斯不被允许进来。我爱你们大家。保持信念。记住，死刑就是谋杀。他们正在夺走一个无辜者的生命。我的律师罗恩·库利，会在这之后在新闻发布会上宣读我的信。我要说的就这些。我爱你们大家。","tags":["35岁","哈里斯"]},{"name":"Denton Crank","text":"致给予我力量的家人，我献上我的爱。","tags":["38岁","哈里斯"]},{"name":"Stephen Nethery","text":"我只想请大家为两个家庭祈祷：我的家人和麦卡锡警官的家人。感谢你们的祈祷。主耶稣，请接纳我的灵魂。","tags":["33岁","达拉斯"]},{"name":"Paul Rougeau","text":"无","tags":["46岁","哈里斯"]},{"name":"Larry Anderson","text":"无","tags":["41岁","哈里斯"]},{"name":"Richard Beavers","text":"无","tags":["39岁","哈里斯"]},{"name":"Harold Barnard","text":"上帝啊，请赦免我的罪。照顾我的人民。赐福并保护所有的人。我为自己的罪忏悔。主啊，带我回家吧。阿门。（几句话听不清。）","tags":["51岁","加尔维斯顿"]},{"name":"Clifford Phillips","text":"关于已故的艾丽丝·西弗夫人的不幸，我想表达我的感受。那是非常不幸的事件，只有上帝知道为何会发生这场意外。我向她的家人表达悔意，以及我给他们生活带来的痛苦和不安。只有上帝能判定我是否真如媒体描绘的那般有罪。我已赋予妻子成为伊斯兰教徒的力量与能量。我将她从爱尔兰悲惨的生活中解救出来。感谢安拉将她赐予我。谋杀绝非安拉的工具。我的妻子十分虔诚。","tags":["59岁","哈里斯"]},{"name":"Anthony Cook","text":"我只想告诉家人我爱他们，感谢主耶稣给了我第二次机会，也感谢他拯救了我。","tags":["34岁","米拉姆"]},{"name":"Antonio Bonham","text":"无","tags":["33岁","哈里斯"]},{"name":"Johnny James","text":"无","tags":["39岁","钱伯斯"]},{"name":"Richard Wilkerson","text":"这次处决并非正义。这次处决是复仇的行为！如果这就是正义，那么正义是盲目的。将一个处于边缘状态的智力低下的年轻男子——他平生第一次犯下重罪——然后污染他真正完整的供词，加上一位带有歧视的法官，再堆上一个全白人陪审团，配合无效的律师协助，抹去改造的可能，迫害证人，你们就这样为这个家庭制造了一个持续十多年的死刑判决。","tags":["29岁","哈里斯"]},{"name":"Ruben Cantu","text":"无","tags":["26岁","贝萨尔"]},{"name":"Carl Kelly","text":"我是一名非洲勇士，生来为呼吸，生来为死亡。","tags":["34岁","麦克伦南"]},{"name":"David Holland","text":"无","tags":["58岁","杰斐逊"]},{"name":"Joseph Jernigan","text":"无","tags":["39岁","纳瓦罗"]},{"name":"Ramon Hernandez","text":"无","tags":["44岁","埃尔帕索"]},{"name":"Danny Harris","text":"我想告诉我的家人，我非常爱他们，我知道他们也爱我。我爱所有这些年支持我的人。我也想告诉梅尔卡一家，我也爱他们。我恳求所有青少年停止暴力，接受耶稣基督，找到胜利。今天我在基督里获得了胜利，感谢耶稣把我的灵魂接到祂珍贵的怀抱中。谢谢你，耶稣。","tags":["32岁","布拉索斯"]},{"name":"Curtis Harris","text":"无","tags":["31岁","布拉索斯"]},{"name":"Markum Duff-Smith","text":"我是罪人中的罪魁。我对‘75年和‘79年的案件负有责任。我的审判不公正，不公平；他们诬陷我。我爱死囚牢房里的所有人，我会永远将他们放在心上。那些支持我的人，我会永远爱你们。吉姆和朱迪·彼得森以及洛佩兹牧师，感谢你们一直在我身边。","tags":["46岁","哈里斯"]},{"name":"John Sawyers","text":"无","tags":["38岁","哈里斯"]},{"name":"Leonel Herrera","text":"我是无辜的，无辜的，无辜的。这一点毫无疑问；我不欠社会任何东西。继续为人权而奋斗，帮助那些无辜的人，特别是格雷厄姆先生。我是一个无辜的人，今晚正在发生一件非常错误的事情。愿上帝保佑你们所有人。我准备好了。","tags":["45岁","卡梅伦"]},{"name":"Darryl Stewart","text":"无","tags":["38岁","哈里斯"]},{"name":"Ramon Montoya","text":"无","tags":["38岁","达拉斯"]},{"name":"Carlos Santana","text":"无","tags":["40岁","哈里斯"]},{"name":"Kavin Lincecum","text":"无","tags":["29岁","布拉佐里亚"]},{"name":"Jeffery Griffin","text":"无","tags":["37岁","哈里斯"]},{"name":"James Demouchette","text":"无","tags":["37岁","哈里斯"]},{"name":"Jesus Romero, Jr.","text":"当他的律师走进证人室时，他说：“告诉妈妈我爱她。”律师回应他说：“我也爱你。”","tags":["27岁","卡梅伦"]},{"name":"Justin May","text":"感谢了他的家人。","tags":["46岁","布拉佐里亚"]},{"name":"Billy White","text":"无","tags":["34岁","哈里斯"]},{"name":"Edward Ellis","text":"我只想让大家知道，检察官和比尔·斯科特是狗娘养的。他对他的家人补充说他爱他们所有人。","tags":["38岁","哈里斯"]},{"name":"David Clark","text":"没有。但他在那里躺着时，确实赞美了主，似乎是在祈祷。","tags":["32岁","布拉索斯"]},{"name":"Johnny Garrett","text":"无","tags":["28岁","波特"]},{"name":"Joe Cordova","text":"无","tags":["39岁","哈里斯"]},{"name":"G.W. Green","text":"动手吧，伙计。上膛开火。生活难道不就是个操蛋的东西吗？","tags":["49岁","蒙哥马利"]},{"name":"James Russell","text":"他最后的声明持续了3分钟。他感谢所有为他减刑而抗争的人。他对家人说，他会带着他们的爱前行。","tags":["42岁","本德堡"]},{"name":"Jerry Bird","text":"我不这么认为。就这些。请开始吧，让一切运转起来。（对母亲无声地说“嗨，妈妈”。）","tags":["54岁","卡梅伦"]},{"name":"Ignacio Cuevas","text":"我要去一个美丽的地方。好了，典狱长，让他们开始吧。","tags":["59岁","哈里斯"]},{"name":"Lawrence Buxton","text":"我准备好了，典狱长。","tags":["38岁","哈里斯"]},{"name":"Richard Andrade","text":"无","tags":["25岁","纽埃西斯"]},{"name":"Johnny Anderson","text":"我想指出一点，我写了一份声明，典狱长会给你们一份副本。我仍然声称我是无辜的，我要说的就这些。","tags":["30岁","杰斐逊"]},{"name":"Jerome Butler","text":"祝大家一生幸福。一切都好。","tags":["54岁","哈里斯"]},{"name":"Carlos De Luna","text":"我想说我没有任何怨恨。我不恨任何人。我爱我的家人。告诉死刑犯走廊上的人保持信念，不要放弃。","tags":["27岁","纽埃西斯"]},{"name":"James Paster","text":"我希望霍华德夫人能从中找到平静。","tags":["44岁","哈里斯"]},{"name":"Stephen McCoy","text":"无","tags":["40岁","哈里斯"]},{"name":"Leon King","text":"我想告诉理查德先生，我感谢他为我所做的一切。我爱你们所有人。愿上帝保佑。再见，大卫。","tags":["44岁","哈里斯"]},{"name":"Raymond Landry, Sr.","text":"无","tags":["39岁","哈里斯"]},{"name":"Donald Franklin","text":"无","tags":["37岁","纽埃西斯"]},{"name":"Robert Streetman","text":"无","tags":["27岁","哈丁"]},{"name":"Joseph Starvaggi","text":"无","tags":["34岁","蒙哥马利"]},{"name":"John Thompson","text":"无","tags":["32岁","贝萨尔"]},{"name":"Elliot Johnson","text":"无","tags":["38岁","杰斐逊"]},{"name":"Anthony Williams","text":"妈妈，我很抱歉给您带来这么多痛苦。请原谅我。请好好照顾自己。欧内斯特和奥蒂斯，照顾好家人。感谢所有帮助过我的人。","tags":["27岁","哈里斯"]},{"name":"Eliseo Moreno","text":"无","tags":["27岁","本德堡"]},{"name":"Michael Evans","text":"我想说我为自己所做的事情感到抱歉，希望得到原谅。我不对任何人怀恨在心——每个人都对我很好，我知道这对他们来说不容易——就这些，我很抱歉。","tags":["30岁","达拉斯"]},{"name":"Chester Wicker","text":"无","tags":["37岁","加尔维斯顿"]},{"name":"Larry Smith","text":"告诉我的妈妈我爱她，并在我走后继续生活下去。愿上帝保佑她。告诉死刑犯走廊上的人继续为摆脱死刑而努力。就这些了。","tags":["30岁","达拉斯"]},{"name":"Randy Woolls","text":"向我的家人告别；我爱你们所有人，我为受害者的家庭感到抱歉。我希望我能弥补他们。我希望外面的人继续为废除死刑而斗争。","tags":["36岁","汤姆格林"]},{"name":"Kenneth Brock","text":"我没有遗言。我准备好了。","tags":["37岁","哈里斯"]},{"name":"Rudy Esquivel","text":"向所有朋友告别；保重。感谢你们成为我的朋友。把我的爱带给每个人。","tags":["50岁","哈里斯"]},{"name":"Jay Pinkerton","text":"当见证人进入行刑室时，平克顿对他的父亲吉恩·平克顿说：“为我坚强起来。”“我想让你知道，我与自己和我的上帝都和解了，”平克顿说。他向安拉——伊斯兰教的至高存在——背诵了一段祈祷文。“我作证，除安拉外别无真神。因你的赞美，我祈求宽恕，并回归于你，”平克顿说。“我爱你，爸爸。”","tags":["24岁","纽埃西斯"]},{"name":"Jeffery Barney","text":"无","tags":["28岁","哈里斯"]},{"name":"Charles Bass","text":"这是我应得的。告诉所有人我告别了。","tags":["30岁","哈里斯"]},{"name":"Charles Rumbaugh","text":"D.J.，劳丽，惠特医生，我所能说的就是告别，对其他人而言，虽然你们不原谅我的过错，但我原谅你们对我的伤害。我准备好开始我的旅程了，我要说的就这些。","tags":["28岁","波特"]},{"name":"Henry Porter","text":"我要感谢沃尔什神父给予我的精神帮助。我要感谢鲍勃·雷（桑德斯）和史蒂夫·布洛的友谊。我想要人们知道，当我开枪打死一个先向我开枪的人时，他们称我为冷血杀手。唯一给我定罪的是，我是墨西哥人，而他是警察。人们曾为我的性命呐喊，今晚他们将取走我的生命。但人们从未为一个被铐在警车后座的十三岁男孩被警察杀害而呐喊。人们也从未为一个殴打并溺死何塞·坎波·托雷斯并将其尸体扔进河里的休斯顿警察而呐喊。你们称之为公平正义。这就是你们的公平正义。这就是美国的公平正义。一个墨西哥人的命一文不值。当警察杀人时，他会得到缓刑或假释。当墨西哥人杀死警察时，这就是你的下场。从那时起，你们就叫我冷血杀人犯。我没有把任何人绑在担架上。我也没有从锁着的门后往任何人的血管里注射毒药。你们称之为正义。我称之为，连同你们的社会，一堆冷血杀手。我说这些话没有任何怨恨或愤怒。我只是实话实说。我希望上帝宽恕我所有的罪过。我希望上帝对社会的仁慈，能如同对我一样。我准备好了，狱长。","tags":["43岁","塔兰特"]},{"name":"Charles Milton","text":"万物非主，唯有真主，我属于你，也将回归于你。我要继续告诉我的兄弟姐妹们要坚强。","tags":["34岁","塔兰特"]},{"name":"Jesse De La Rosa","text":"无","tags":["24岁","贝萨尔"]},{"name":"Stephen Morin","text":"天父，我为此刻献上感谢，感谢我们共度的时光，感谢你国度中的团契与我面前的基督徒家庭（他呼喊着在场见证者的名字）。请让你的圣灵流淌，因我深知你的爱已倾注于我。赦免他们吧，因他们所做的他们不晓得，如同你已赦免我，我也已饶恕他们。主耶稣，我将灵魂交托于你，我赞美你，我感谢你。","tags":["34岁","杰斐逊"]},{"name":"Doyle Skillern","text":"愿我的家人能感到欣慰并原谅，感恩。","tags":["49岁","拉伯克"]},{"name":"Thomas Barefoot","text":"当被问及是否有遗言时，他回答说：“是的，我有。”我希望有一天，我们能像看待被烧死的女巫一样，回首我们现在正在做的邪恶之事。我希望每个人都知道，我对此毫无怨恨。我原谅他们所有人。我希望所有我曾亏待过的人都能原谅我。我整天都在为卡尔·莱文的妻子祈祷，希望她能驱散心中的怨恨，因为她心中的那份怨恨，就像任何其他罪恶一样，必将把她送入地狱。我对我所做的一切感到抱歉。我希望他们能原谅我。“莎伦，替我向所有的朋友告别。你知道他们是谁：查尔斯·巴斯、大卫·鲍威尔……”然后他咳嗽了几声，便没有再说下去。","tags":["39岁","贝尔"]},{"name":"Ronald O'Bryan","text":"即将在几分钟内发生的事情是错误的！然而，作为人类，我们确实会犯错误和过失。这次处决就是其中的一个错误，但这并不意味着我们整个司法体系都是错误的。因此，我将原谅所有以任何方式参与我死亡的人。同时，也请我39年生命中曾以任何方式冒犯过的人，祈求你们的原谅，正如我原谅所有以任何方式冒犯过我的人一样。我祈求并恳求真主宽恕我们所有人，作为人类个体。对于我的挚爱亲人，我献上我不朽的爱。对于亲近我的人，请你们在心中知晓，我爱你们每一个人。愿上帝保佑你们所有人，愿上帝最美好的祝福永远属于你们。罗纳德·C·奥布莱恩 附言：在我待在狱中的这段时间里，所有德州监狱管理局的人员都待我很好。","tags":["39岁","哈里斯"]},{"name":"James Autry","text":"无","tags":["29岁","杰斐逊"]},{"name":"Charlie Brooks, Jr.","text":"给媒体的声明：此刻，我丝毫不在意这具肉体将遭遇什么。我畏惧的只有真主，唯有真主，此刻只有他有能力决定我的生死……作为一个虔诚的穆斯林，我所受的教导并坚信的是，这个物质世界仅仅是为了让我们为即将到来的真正生命做准备……自从成为穆斯林以来，我一直努力按照真主希望我生活的方式去生活。","tags":["40岁","塔兰特"]},{"name":"Ruben Cardenas","text":"这是我要说的话：我最后的遗言。首先，我想感谢我的家人，感谢你们相信我，一直陪伴我到最后。我非常爱你们！我也知道你们同样爱我！生活仍将继续。接下来，我还想感谢我的律师莫里·莱文、艾丽西亚·阿梅斯夸·罗德里格斯和桑德拉·巴布科克，感谢她们为我付出的所有努力和帮助。我无比感激。我还要感谢墨西哥领事馆的所有帮助，以及每一位试图帮助我的政府官员。感谢玛丽塞拉·卢纳和朱莉娅·蒂姆，你们是那么好的朋友！现在！我不会也不能为别人的罪行道歉，但是，我会回来寻求正义！你们可以相信这点。谢谢。","tags":["47岁","伊达尔戈"]},{"name":"Robert Pruett","text":"我只想告诉在场的每个人，我非常爱你们。我曾伤害过很多人，也有很多人伤害过我。我深深地爱着你们。生命不会在这里终结，它会永远延续下去。我不得不通过艰难的方式学习人生的教训。总有一天，不再需要去伤害他人。我深深地爱着你们。我已准备好离开，但我会回来的。各位晚安，各位晚安。典狱长，我说完了。","tags":["38岁","比"]},{"name":"Taichin Preyor","text":"首先，我想说，科雷塔·斯科特·金曾言：‘正义从未通过夺取生命而进步。’最后，对我的妻子和孩子说：我永远爱你们，始终如一。就这些。","tags":["46岁","贝萨尔"]}];

  /* ========== Render Notes ========== */
  var notesList = document.getElementById('notesList');

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function renderNotes(notes) {
    notesList.innerHTML = '';
    notes.forEach(function (note) {
      var card = document.createElement('div');
      card.className = 'note-card';

      var meta = document.createElement('div');
      meta.className = 'note-meta';

      var tags = note.tags || [];
      if (typeof tags === 'string') tags = [tags];
      tags.forEach(function (t) {
        var span = document.createElement('span');
        span.className = 'note-tag';
        span.textContent = t;
        meta.appendChild(span);
      });

      var text = document.createElement('div');
      text.className = 'note-text';
      text.textContent = note.text || '';

      var toggle = document.createElement('button');
      toggle.className = 'note-toggle';
      toggle.textContent = '展开全文';

      text.addEventListener('click', function () {
        if (text.classList.contains('expanded')) {
          text.classList.remove('expanded');
          toggle.textContent = '展开全文';
        } else {
          text.classList.add('expanded');
          toggle.textContent = '收起';
        }
      });

      toggle.addEventListener('click', function () {
        if (text.classList.contains('expanded')) {
          text.classList.remove('expanded');
          toggle.textContent = '展开全文';
        } else {
          text.classList.add('expanded');
          toggle.textContent = '收起';
        }
      });

      card.appendChild(meta);
      card.appendChild(text);
      card.appendChild(toggle);
      notesList.appendChild(card);
    });
  }

  renderNotes(notesData);

  /* ========== Dust Particle System ========== */
  var dustCanvas = document.getElementById('dust');
  var dCtx = dustCanvas.getContext('2d');
  var particles = [];
  var PARTICLE_COUNT = 60;

  function resizeDust() {
    dustCanvas.width = window.innerWidth;
    dustCanvas.height = window.innerHeight;
  }

  function createParticle() {
    return {
      x: Math.random() * dustCanvas.width,
      y: Math.random() * dustCanvas.height,
      r: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.35 + 0.05,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -(Math.random() * 0.3 + 0.1),
      life: Math.random() * 1000
    };
  }

  function initParticles() {
    particles = [];
    for (var i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(createParticle());
    }
  }

  function drawDust() {
    dCtx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life += 1;

      if (p.y < -10 || p.x < -10 || p.x > dustCanvas.width + 10) {
        particles[i] = createParticle();
        particles[i].y = dustCanvas.height + 10;
        continue;
      }

      var flicker = 0.5 + 0.5 * Math.sin(p.life * 0.008);
      var a = p.alpha * flicker;

      dCtx.beginPath();
      dCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      dCtx.fillStyle = 'rgba(225,205,164,' + a + ')';
      dCtx.fill();
    }
    requestAnimationFrame(drawDust);
  }

  resizeDust();
  initParticles();
  drawDust();

  /* ========== Scroll Reveal ========== */
  var reveals = document.querySelectorAll('.reveal');
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.12 });

  reveals.forEach(function (el) {
    observer.observe(el);
  });

  /* ========== Resize Handler ========== */
  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      resizeDust();
      wordcloudChart.resize();
      emotionChart.resize();
      genderChart.resize();
      ageChart.resize();
    }, 200);
  });

})();
</script>
